<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>fleet orchestration card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0d0d0d; --bg-2:#111111; --surface:#161616; --surface-2:#1c1c1c;
  --border:#2a2a2a; --border-2:#3a3a3a;
  --fg:#e8e6e3; --muted:#8a8784; --muted-2:#6a6764;
  --accent:#d97757; --accent-2:#e8a87c; --green:#87b386; --cyan:#7fb3c8; --yellow:#d4b06a;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:1400px; height:700px; overflow:hidden; }
body {
  font-family:"JetBrains Mono", ui-monospace, Menlo, monospace; color:var(--fg);
  background:
    radial-gradient(1000px 480px at 85% -8%, rgba(217,119,87,.11), transparent 60%),
    radial-gradient(800px 400px at -5% 115%, rgba(135,179,134,.06), transparent 60%),
    var(--bg);
  position:relative;
}
body::before {
  content:""; position:absolute; inset:0;
  background-image:radial-gradient(rgba(232,230,227,.045) 1px, transparent 1px);
  background-size:26px 26px;
  mask-image:linear-gradient(180deg, transparent 8%, black 40%);
  -webkit-mask-image:linear-gradient(180deg, transparent 8%, black 40%);
}
.brand { position:absolute; top:30px; left:56px; font-size:15px; font-weight:700; }
.brand .p { color:var(--accent); } .brand .c { color:var(--cyan); }
.gh { position:absolute; top:32px; right:56px; font-size:13px; color:var(--muted-2); }
h1 { position:absolute; top:66px; left:56px; font-size:38px; font-weight:800; letter-spacing:-0.02em; line-height:1.22; }
h1 .a { color:var(--accent); }
.sub { position:absolute; top:172px; left:58px; font-size:15.5px; color:var(--muted); max-width:760px; line-height:1.5; }
.sub b { color:var(--fg); font-weight:700; }
.tagline { position:absolute; bottom:26px; left:0; right:0; text-align:center;
  font-size:15px; letter-spacing:.22em; color:var(--accent-2); font-weight:700; }
.tagline .dim { color:var(--muted-2); }
svg { position:absolute; top:210px; left:0; }
svg text { font-family:"JetBrains Mono", monospace; }
</style>
</head>
<body>
<div class="brand"><span class="p">you@fleet</span><span class="c">:~</span><span class="p">$</span> ./orchestra --watch</div>
<div class="gh">github.com/acrdlph/orchestra</div>
<h1>Your accounts have limits.<br><span class="a">Your fleet doesn't.</span></h1>
<div class="sub">orchestra watches every Claude Code account and worktree at once — when an agent
runs dry, it flags the handoff and the <b>branch keeps moving</b>.</div>

<svg width="1400" height="440" viewBox="0 0 1400 440">
  <!-- lane guides -->
  <g stroke="#1c1c1c" stroke-width="1">
    <line x1="190" y1="90"  x2="1345" y2="90"/>
    <line x1="190" y1="210" x2="1345" y2="210"/>
    <line x1="190" y1="330" x2="1345" y2="330"/>
  </g>

  <!-- lane labels -->
  <g font-size="13" font-weight="800">
    <text x="62" y="95"  fill="#7fb3c8">[work]</text>
    <text x="62" y="215" fill="#7fb3c8">[personal]</text>
    <text x="62" y="335" fill="#7fb3c8">[spare]</text>
  </g>
  <g font-size="10" fill="#6a6764">
    <text x="62" y="112">claude acct 1</text>
    <text x="62" y="232">claude acct 2</text>
    <text x="62" y="352">claude acct 3</text>
  </g>

  <!-- branch name -->
  <text x="200" y="64" font-size="13" font-weight="700" fill="#7fb3c8"> feat/payments-v2</text>

  <!-- ============ leg 1: [work] ============ -->
  <path d="M 200 90 L 560 90" stroke="#87b386" stroke-width="3" stroke-linecap="round"/>
  <g fill="#87b386">
    <circle cx="240" cy="90" r="3"/><circle cx="290" cy="90" r="3"/><circle cx="330" cy="90" r="3"/>
    <circle cx="395" cy="90" r="3"/><circle cx="450" cy="90" r="3"/><circle cx="505" cy="90" r="3"/>
  </g>
  <!-- limit hit -->
  <circle cx="560" cy="90" r="11" fill="#0d0d0d" stroke="#d4b06a" stroke-width="2.5"/>
  <text x="560" y="95" font-size="11" text-anchor="middle" fill="#d4b06a">⛔</text>
  <text x="560" y="60" font-size="11.5" font-weight="800" text-anchor="middle" fill="#d4b06a">LIMIT HIT</text>
  <text x="540" y="120" font-size="10" text-anchor="end" fill="#6a6764">0% left · resets 4d</text>
  <!-- handoff doc -->
  <rect x="592" y="72" width="118" height="26" rx="6" fill="#161616" stroke="#e8a87c" stroke-width="1.2"/>
  <text x="651" y="89" font-size="10.5" font-weight="700" text-anchor="middle" fill="#e8a87c">✍ HANDOFF.md</text>
  <text x="651" y="112" font-size="9.5" text-anchor="middle" fill="#6a6764">written on opus</text>
  <!-- handoff curve to lane 2 -->
  <path d="M 710 98 C 760 130, 740 180, 790 205" fill="none" stroke="#d97757" stroke-width="2.2" stroke-dasharray="6 5"/>
  <path d="M 790 205 l -12 -7 l 4 12 z" fill="#d97757"/>
  <text x="782" y="158" font-size="11" font-weight="800" fill="#d97757">↳ handoff</text>

  <!-- board badge under leg1 -->
  <rect x="480" y="132" width="230" height="24" rx="6" fill="#111111" stroke="#2a2a2a"/>
  <text x="595" y="148" font-size="10" text-anchor="middle" fill="#87b386">↳ work continued by [personal] ✓</text>

  <!-- ============ leg 2: [personal] ============ -->
  <path d="M 790 210 L 1010 210" stroke="#87b386" stroke-width="3" stroke-linecap="round"/>
  <g fill="#87b386">
    <circle cx="830" cy="210" r="3"/><circle cx="875" cy="210" r="3"/><circle cx="930" cy="210" r="3"/>
    <circle cx="975" cy="210" r="3"/>
  </g>
  <text x="795" y="188" font-size="10" fill="#6a6764">⌁ reads HANDOFF.md · continues</text>
  <circle cx="1010" cy="210" r="11" fill="#0d0d0d" stroke="#d4b06a" stroke-width="2.5"/>
  <text x="1010" y="215" font-size="11" text-anchor="middle" fill="#d4b06a">⛔</text>
  <text x="1010" y="180" font-size="11.5" font-weight="800" text-anchor="middle" fill="#d4b06a">LIMIT HIT</text>
  <rect x="1042" y="192" width="118" height="26" rx="6" fill="#161616" stroke="#e8a87c" stroke-width="1.2"/>
  <text x="1101" y="209" font-size="10.5" font-weight="700" text-anchor="middle" fill="#e8a87c">✍ HANDOFF.md</text>
  <path d="M 1160 218 C 1205 248, 1185 300, 1230 325" fill="none" stroke="#d97757" stroke-width="2.2" stroke-dasharray="6 5"/>
  <path d="M 1230 325 l -12 -7 l 4 12 z" fill="#d97757"/>
  <text x="1222" y="278" font-size="11" font-weight="800" fill="#d97757">↳ handoff</text>

  <!-- ============ leg 3: [spare] ============ -->
  <path d="M 1230 330 L 1330 330" stroke="#87b386" stroke-width="3" stroke-linecap="round"/>
  <circle cx="1268" cy="330" r="3" fill="#87b386"/><circle cx="1300" cy="330" r="3" fill="#87b386"/>
  <!-- pulsing tip -->
  <circle cx="1330" cy="330" r="17" fill="none" stroke="#87b386" stroke-width="1" opacity=".25"/>
  <circle cx="1330" cy="330" r="12" fill="none" stroke="#87b386" stroke-width="1.4" opacity=".5"/>
  <circle cx="1330" cy="330" r="7" fill="#0d0d0d" stroke="#87b386" stroke-width="2.5"/>
  <circle cx="1330" cy="330" r="2.8" fill="#87b386"/>
  <text x="1330" y="368" font-size="11.5" font-weight="800" text-anchor="middle" fill="#87b386">● WORKING · now</text>

  <!-- time axis -->
  <g font-size="10.5" fill="#6a6764">
    <text x="200" y="415">morning</text>
    <text x="760" y="415" text-anchor="middle">afternoon</text>
    <text x="1345" y="415" text-anchor="end">now</text>
  </g>
  <line x1="190" y1="398" x2="1345" y2="398" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M 1345 398 l -9 -4 v 8 z" fill="#2a2a2a"/>
</svg>

<div class="tagline">ONE BRANCH <span class="dim">·</span> THREE ACCOUNTS <span class="dim">·</span> ZERO DOWNTIME</div>
</body>
</html>
