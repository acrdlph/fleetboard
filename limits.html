<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fleetboard — limits</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23d97757%22 font-family=%22monospace%22>⌁</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0d0d0d; --bg-2:#111111; --surface:#161616; --surface-2:#1c1c1c;
  --border:#2a2a2a; --border-2:#3a3a3a;
  --fg:#e8e6e3; --muted:#8a8784; --muted-2:#6a6764;
  --accent:#d97757; --accent-2:#e8a87c; --green:#87b386; --cyan:#7fb3c8; --yellow:#d4b06a;
  --accent-glow:rgba(217,119,87,.25);
  --mono:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
* { box-sizing:border-box; margin:0; padding:0; }
html { background:var(--bg); }
body {
  font-family:var(--mono); font-size:13.5px; color:var(--fg);
  background:
    radial-gradient(1100px 480px at 80% -10%, rgba(217,119,87,.05), transparent 60%),
    var(--bg);
  min-height:100vh; padding-bottom:60px; -webkit-font-smoothing:antialiased;
}
.wrap { max-width:1500px; margin-inline:auto; padding-inline:22px; }
header {
  position:sticky; top:0; z-index:10;
  background:color-mix(in oklab, var(--bg) 86%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
}
.nav { display:flex; align-items:center; justify-content:space-between; height:52px; gap:16px; }
.brand { font-weight:700; white-space:nowrap; }
.brand .prompt { color:var(--accent); }
.brand .path { color:var(--cyan); }
.brand .cursor { display:inline-block; width:8px; height:15px; background:var(--accent);
  vertical-align:-2px; margin-left:2px; animation:blink 1.1s steps(1) infinite; }
@keyframes blink { 50% { opacity:0; } }
.sync { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:8px; }
.sync .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }

.side { position:fixed; left:0; top:52px; bottom:0; width:118px; z-index:9;
  padding:16px 10px; display:flex; flex-direction:column; gap:5px;
  border-right:1px solid var(--border); background:var(--bg-2); }
.side a { color:var(--muted); text-decoration:none; font-size:12.5px; font-weight:600;
  padding:8px 12px; border-radius:7px; display:flex; gap:9px; align-items:baseline;
  transition:color .2s var(--ease), background .2s var(--ease); }
.side a .g { color:var(--muted-2); }
.side a:hover { color:var(--fg); background:var(--surface); }
.side a.active { color:var(--fg); background:var(--surface); box-shadow:inset 2px 0 0 var(--accent); }
.side a.active .g { color:var(--accent); }
.content { margin-left:118px; }
@media (max-width:860px) {
  .side { position:static; width:auto; flex-direction:row; border-right:none;
    border-bottom:1px solid var(--border); padding:8px 22px; }
  .content { margin-left:0; }
}

.bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:18px 0 14px; }
button {
  font:inherit; font-size:12px; font-weight:700; color:var(--muted);
  background:var(--bg-2); border:1px solid var(--border-2); border-radius:7px;
  padding:7px 13px; cursor:pointer; transition:all .15s var(--ease);
}
button:hover { color:var(--fg); border-color:var(--accent); }
button.danger { color:var(--accent-2); }
button:disabled { opacity:.5; cursor:wait; }
.meta-line { color:var(--muted-2); font-size:11.5px; margin-left:auto; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(390px,1fr)); gap:12px; }
.acct { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.acct.exhausted { border-color:var(--yellow); box-shadow:0 0 0 1px rgba(212,176,106,.25); }
.acct.best { border-color:var(--green); }
.ahead { display:flex; align-items:center; gap:10px; padding:11px 15px;
  background:var(--surface-2); border-bottom:1px solid var(--border); }
.ahead .nm { font-weight:800; font-size:15px; }
.ahead .plan { font-size:10px; font-weight:800; letter-spacing:.1em; color:var(--cyan);
  border:1px solid var(--cyan); border-radius:5px; padding:2.5px 7px; }
.ahead .tag { font-size:10px; font-weight:800; letter-spacing:.08em; border-radius:5px; padding:2.5px 7px; border:1px solid; }
.ahead .tag.best { color:var(--green); border-color:var(--green); }
.ahead .tag.gone { color:var(--yellow); border-color:var(--yellow); }
.ahead .hr { margin-left:auto; font-size:19px; font-weight:800; }
.ahead .hr .u { font-size:10.5px; color:var(--muted-2); font-weight:500; }
.dirline { padding:7px 15px 0; color:var(--muted-2); font-size:11px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lims { padding:10px 15px 14px; display:flex; flex-direction:column; gap:9px; }
.lim { display:grid; grid-template-columns:112px 1fr 96px; gap:10px; align-items:center; font-size:12px; }
.lim .lab { color:var(--fg); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lim .lab .mo { color:var(--muted-2); font-size:9.5px; letter-spacing:.06em; }
.track { height:10px; background:var(--bg-2); border:1px solid var(--border); border-radius:5px; overflow:hidden; }
.fill { height:100%; border-radius:4px; }
.lim .num { text-align:right; color:var(--muted); font-size:11.5px; white-space:nowrap; }
.lim .num b { color:var(--fg); }
.resets { grid-column:2 / 4; color:var(--muted-2); font-size:10.5px; margin-top:-5px; }
.resets.hot { color:var(--yellow); }
.err { color:var(--accent-2); background:var(--surface); border:1px solid var(--accent);
  border-radius:10px; padding:16px 18px; margin-top:10px; font-size:13px; line-height:1.6; }
.note { color:var(--muted-2); font-size:11.5px; margin-top:18px; }
.note a { color:var(--muted); }
</style>
</head>
<body>
<header><div class="wrap nav">
  <div class="brand"><span class="prompt" id="brandUser">fleet</span><span class="path">:~</span><span class="prompt">$</span> ./fleetboard --limits<span class="cursor"></span></div>
  <div class="sync" id="sync"><span class="dot"></span><span id="syncText">loading…</span></div>
</div></header>

<nav class="side">
  <a href="/"><span class="g">⌗</span>board</a>
  <a href="/map"><span class="g">⌁</span>map</a>
  <a href="/limits" class="active"><span class="g">◔</span>limits</a>
</nav>

<div class="wrap content">
  <div class="bar">
    <button id="reload">↻ reload (cached)</button>
    <button id="force" class="danger" title="bypasses every cache and refetches from the Anthropic API">⟳ force refetch — hits the API</button>
    <span class="meta-line" id="fetched"></span>
  </div>
  <div id="out"></div>
  <div class="note">data via <a href="https://github.com/acrdlph/cclimits">cclimits</a> —
    cached server-side for 5 min on top of cclimits' own cache; only the force button
    triggers a network refetch. bars show <b>used</b> capacity.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function rel(s) {
  s = Math.max(0, Math.round(s));
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h" + Math.floor(s%3600/60) + "m";
  return Math.floor(s/86400) + "d" + Math.floor(s%86400/3600) + "h";
}
function shade(remaining) {
  if (remaining >= 50) return "var(--green)";
  if (remaining >= 15) return "var(--yellow)";
  return "var(--accent)";
}

function render(d) {
  if (!d || !d.available) {
    $("out").innerHTML = `<div class="err">◔ limits unavailable — ${esc(d && d.error || "no data")}.<br>
      fleetboard shells out to <b>cclimits</b> for this view; install it from
      github.com/acrdlph/cclimits and make sure it's on PATH (or set
      <b>"cclimits_cmd"</b> in fleetboard.config.json).</div>`;
    $("fetched").textContent = "";
    return;
  }
  const accounts = [...d.accounts].sort((a, b) => (b.headroom_percent ?? -1) - (a.headroom_percent ?? -1));
  const bestSlug = accounts.length && accounts[0].ok ? accounts[0].slug : null;
  $("out").innerHTML = `<div class="grid">` + accounts.map(a => {
    if (!a.ok) return `<div class="acct"><div class="ahead"><span class="nm">${esc(a.slug)}</span>
      <span class="tag gone">✗ ERROR</span></div><div class="lims"><div class="lim"><span class="lab">${esc(a.error || "unreadable")}</span></div></div></div>`;
    const exhausted = a.limits.some(l => l.exhausted_now);
    const hr = a.headroom_percent ?? 0;
    const rows = a.limits.map(l => {
      const rem = l.remaining_percent ?? (100 - l.percent);
      const col = l.exhausted_now ? "var(--accent)" : shade(rem);
      let out = `<div class="lim">
        <span class="lab">${esc(l.label)}${l.model_scoped ? ` <span class="mo">MODEL</span>` : ""}</span>
        <div class="track"><div class="fill" style="width:${Math.min(100, l.percent)}%;background:${col}"></div></div>
        <span class="num"><b>${Math.round(l.percent)}%</b> used${l.exhausted_now ? " ⛔" : ""}</span></div>`;
      if (l.resets_in_seconds != null && (l.exhausted_now || l.percent >= 50))
        out += `<div class="lim"><span></span><span class="resets ${l.exhausted_now ? "hot" : ""}">${l.exhausted_now ? "⛔ exhausted — " : ""}resets in ${rel(l.resets_in_seconds)}</span></div>`;
      return out;
    }).join("");
    return `<div class="acct${exhausted ? " exhausted" : ""}${a.slug === bestSlug && !exhausted ? " best" : ""}">
      <div class="ahead">
        <span class="nm">${esc(a.slug)}</span>
        <span class="plan">${esc((a.plan || "?").toUpperCase())}</span>
        ${a.slug === bestSlug && !exhausted ? `<span class="tag best">◇ MOST HEADROOM</span>` : ""}
        ${exhausted ? `<span class="tag gone">⛔ EXHAUSTED</span>` : ""}
        <span class="hr" style="color:${shade(hr)}">${Math.round(hr)}<span class="u">% left</span></span>
      </div>
      <div class="dirline">${esc(a.config_dir)}</div>
      <div class="lims">${rows}</div>
    </div>`;
  }).join("") + `</div>`;
  const age = d.fetched_at ? (Date.now()/1000 - d.fetched_at) : null;
  $("fetched").textContent = age != null ? `fetched ${rel(age)} ago` : "";
  $("syncText").textContent = "loaded " + new Date().toLocaleTimeString();
}

async function load(refresh) {
  $("reload").disabled = $("force").disabled = true;
  $("syncText").textContent = refresh ? "refetching from API…" : "loading…";
  try {
    const r = await fetch("/api/limits" + (refresh ? "?refresh=1" : ""));
    render(await r.json());
  } catch (e) {
    render({ available:false, error:"request failed" });
  }
  $("reload").disabled = $("force").disabled = false;
}
$("reload").addEventListener("click", () => load(false));
$("force").addEventListener("click", () => load(true));
fetch("/api/state").then(r => r.json()).then(s => { $("brandUser").textContent = `${s.user || "you"}@fleet`; }).catch(() => {});
load(false);
</script>
</body>
</html>
