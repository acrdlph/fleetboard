<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>orchestra</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23d97757%22 font-family=%22monospace%22>⌁</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ==== orchestra type system =================================
   One typeface — IBM Plex Mono — but still two voices:
     --mono  the machine voice: identifiers, paths, counts, statuses,
             timestamps, buttons (they're commands). The default.
     --sans  the human voice: natural-language text (topics, chat,
             notes, mission text). Currently ALSO Plex Mono — the
             voice is carried by color, weight and looser leading
             instead of a second face. To reintroduce a reading face
             (e.g. Inter), swap this one stack and re-add it to the
             font link: every human-voice rule routes through --sans.
   Scale: 10 / 11 / 12 / 13 / 14 / 18 / 26 px — nothing in between.
   Weights: 400 body · 500 quiet emphasis · 600 names, labels &
   headline numbers. Uppercase micro-labels get letter-spacing --track.
============================================================== */
:root {
  --bg:#0d0d0d; --bg-2:#111111; --surface:#161616; --surface-2:#1c1c1c;
  --border:#2a2a2a; --border-2:#3a3a3a;
  --fg:#e8e6e3; --muted:#8a8784; --muted-2:#6a6764;
  --accent:#d97757; --accent-2:#e8a87c; --green:#87b386; --cyan:#7fb3c8; --yellow:#d4b06a;
  --accent-glow:rgba(217,119,87,.25); --green-glow:rgba(135,179,134,.18);
  --mono:"IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --sans:"IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --fs-2xs:10px; --fs-xs:11px; --fs-sm:12px; --fs-md:13px; --fs-lg:14px;
  --fs-xl:18px; --fs-2xl:26px;
  --track:.08em;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
/* the human voice */
.topic, .said, .you, .wsaid, .hand, .msg, .dnote, .dresult,
.tile .sub, .dhead .sub, .controls label, .logrow .lx, #toast
  { font-family:var(--sans); letter-spacing:0; }
/* prefix glyphs stay mono so rows keep their terminal alignment */
.said::before, .you::before, .wsaid::before,
.msg.you::before, .msg.agent::before { font-family:var(--mono); }
* { box-sizing:border-box; margin:0; padding:0; }
html { background:var(--bg); }
body {
  font-family:var(--mono); font-size:var(--fs-md); line-height:1.5; color:var(--fg);
  background:
    radial-gradient(1200px 500px at 70% -10%, rgba(217,119,87,.05), transparent 60%),
    var(--bg);
  min-height:100vh; padding-bottom:60px;
  -webkit-font-smoothing:antialiased;
}
.wrap { max-width:1500px; margin-inline:auto; padding-inline:22px; }

/* ---- header ---- */
header {
  position:sticky; top:0; z-index:10;
  background:color-mix(in oklab, var(--bg) 86%, transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.nav { display:flex; align-items:center; justify-content:space-between; height:52px; gap:16px; }
/* the bar spans the viewport — brand left-bound, controls at the right edge —
   while the content below keeps its centered 1500px column */
header .wrap { max-width:none; }
.brand { font-weight:600; white-space:nowrap; overflow:hidden; }
.brand .prompt { color:var(--accent); }
.brand .path { color:var(--cyan); }
.brand .cmd { color:var(--fg); }
@keyframes blink { 50% { opacity:0; } }
.navr { display:flex; align-items:center; gap:10px; }
.maplink { color:var(--muted); text-decoration:none; padding:6px 11px; border-radius:6px;
  font-size:var(--fs-sm); transition:color .2s var(--ease), background .2s var(--ease); }
.maplink::before { content:"~/"; color:var(--muted-2); }
.maplink:hover { color:var(--fg); background:var(--surface); }
.sync { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:var(--fs-xs); white-space:nowrap; }
.sync .dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green-glow); }
.sync.err .dot { background:var(--accent); }

/* ---- side nav ---- */
.side { position:fixed; left:0; top:52px; bottom:0; width:118px; z-index:9;
  padding:16px 10px; display:flex; flex-direction:column; gap:5px;
  border-right:1px solid var(--border); background:var(--bg-2); }
.side a { color:var(--muted); text-decoration:none; font-size:var(--fs-sm); font-weight:500;
  padding:8px 12px; border-radius:7px; display:flex; gap:9px; align-items:baseline;
  transition:color .2s var(--ease), background .2s var(--ease); }
.side a .g { color:var(--muted-2); }
.side a:hover { color:var(--fg); background:var(--surface); }
.side a.active { color:var(--fg); background:var(--surface); box-shadow:inset 2px 0 0 var(--accent); }
.side a.active .g { color:var(--accent); }
.content { margin-left:118px; }
@media (max-width:860px) {
  .side { position:static; width:auto; flex-direction:row; border-right:none;
    border-bottom:1px solid var(--border); padding:8px 22px; }
  .content { margin-left:0; }
}

/* ---- stat tiles ---- */
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; margin:18px 0; }
.tile {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px;
}
.tile .k { font-size:var(--fs-2xs); font-weight:500; letter-spacing:var(--track); color:var(--muted); text-transform:uppercase; }
/* headline numbers wear the sans (proportional figures read better at display
   sizes than tabular mono digits); every other number on the board stays mono */
.tile .v { font-family:var(--sans); font-size:var(--fs-2xl); font-weight:600; margin-top:2px; }
.tile .sub { font-size:var(--fs-xs); color:var(--muted); margin-top:2px; min-height:16px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tile.attn { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow), 0 0 18px var(--accent-glow); }
.tile.attn .v { color:var(--accent); }
.tile.ok .v { color:var(--green); }
.tile.free .v { color:var(--cyan); }

/* ---- worktree cards ---- */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(430px,1fr)); gap:12px; }
@media (max-width:520px){ .grid { grid-template-columns:1fr; } }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; transition:border-color .25s var(--ease);
}
.card.attention { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow); }
.card-head {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--surface-2); border-bottom:1px solid var(--border);
}
.card-head .name { font-weight:600; font-size:var(--fs-lg); }
.badge {
  font-size:var(--fs-2xs); font-weight:600; letter-spacing:var(--track); padding:3px 8px;
  border-radius:5px; border:1px solid; white-space:nowrap;
}
.badge.free  { color:var(--cyan);   border-color:var(--cyan);   background:rgba(127,179,200,.12); }
.badge.busy  { color:var(--green);  border-color:var(--green);  background:var(--green-glow); }
.badge.waiting { color:var(--yellow); border-color:var(--yellow); background:rgba(212,176,106,.12); }
.badge.attention { color:var(--accent); border-color:var(--accent); background:var(--accent-glow);
  animation:pulse 1.6s var(--ease) infinite; }
@keyframes pulse { 50% { box-shadow:0 0 10px var(--accent-glow); } }
.card-head .procs { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.card-head .noproc { color:var(--muted-2); font-size:var(--fs-xs); }
.pidbtn {
  font:inherit; font-size:var(--fs-2xs); color:var(--muted); background:var(--bg-2);
  border:1px solid var(--border-2); border-radius:5px; padding:2.5px 8px; cursor:pointer;
  transition:border-color .15s var(--ease), color .15s var(--ease); white-space:nowrap;
}
.pidbtn:hover { color:var(--fg); border-color:var(--accent); }
.pidbtn .tt { color:var(--cyan); }
/* pairing fell back to freshness — shown, but not asserted */
.pidbtn.guess { border-style:dashed; opacity:.75; }
.pidbtn.guess .tt { color:var(--muted); }
#toast {
  position:fixed; right:18px; bottom:18px; z-index:50; max-width:440px;
  background:var(--surface-2); border:1px solid var(--accent); border-radius:9px;
  padding:10px 14px; font-size:var(--fs-sm); line-height:1.55; color:var(--fg); display:none;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* ---- action buttons ---- */
.abtn {
  font:inherit; font-size:var(--fs-2xs); font-weight:600; color:var(--muted);
  background:var(--bg-2); border:1px solid var(--border-2); border-radius:5px;
  padding:2px 8px; cursor:pointer; transition:all .15s var(--ease);
}
.abtn:hover:not(:disabled) { color:var(--fg); border-color:var(--accent); }
.abtn:disabled { opacity:.45; cursor:default; }
.abtn.armed { color:var(--green); border-color:var(--green); animation:pulse 1.6s var(--ease) infinite; }
/* an armed auto-resume is calm certainty, not an alert — green, no pulse */
.abtn.sched { color:var(--green); border-color:var(--green); }
.abtn.sched.bad { color:var(--accent); border-color:var(--accent); }
#missionBtn {
  font:inherit; font-size:var(--fs-sm); font-weight:600; color:var(--accent);
  background:var(--bg-2); border:1px solid var(--accent); border-radius:7px;
  padding:6px 13px; cursor:pointer; transition:all .15s var(--ease);
}
#missionBtn:hover { background:var(--accent); color:var(--bg); }

/* ---- drawer (chat / mission) ---- */
#drawer {
  position:fixed; top:52px; right:0; bottom:0; width:min(460px, 96vw); z-index:30;
  background:var(--bg-2); border-left:1px solid var(--border-2);
  box-shadow:-18px 0 50px rgba(0,0,0,.55);
  display:none; flex-direction:column;
  transition:width .2s var(--ease);
}
#drawer.open { display:flex; }
#drawer.wide { width:min(920px, 94vw); }
#drawer.wide #dbody { padding:18px 26px; }
#mText {
  flex:1; min-height:45vh; resize:none;
  font-family:var(--sans); font-size:var(--fs-lg); line-height:1.7;
  color:var(--fg); background:var(--bg);
  border:1px solid var(--border-2); border-radius:10px; padding:14px 16px; width:100%;
}
#mText:focus { outline:1px solid var(--accent); }
.dhead { display:flex; align-items:center; gap:10px; padding:12px 16px;
  border-bottom:1px solid var(--border); background:var(--surface); }
.dhead .t { font-weight:600; font-size:var(--fs-md); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dhead .sub { color:var(--muted-2); font-size:var(--fs-xs); }
.dhead button { margin-left:auto; font:inherit; background:none; border:none;
  color:var(--muted); font-size:16px; cursor:pointer; }
.dhead button:hover { color:var(--fg); }
#dbody { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.msg { font-size:var(--fs-sm); line-height:1.6; border-radius:8px; padding:8px 11px; max-width:95%; }
.msg.you { background:var(--surface-2); border:1px solid var(--border-2); align-self:flex-end; color:var(--fg); }
.msg.you::before { content:"❯ "; color:var(--accent); font-weight:600; }
.msg.agent { background:var(--surface); border:1px solid var(--border); align-self:flex-start; color:var(--muted); }
.msg.agent::before { content:"⏎ "; color:var(--green); }
.dfoot { border-top:1px solid var(--border); padding:12px 14px; background:var(--surface);
  display:flex; flex-direction:column; gap:8px; }
.dfoot textarea, .dfoot input[type=text], .dfoot input[type=datetime-local] {
  font-family:var(--sans); font-size:var(--fs-md); line-height:1.55;
  color:var(--fg); background:var(--bg);
  border:1px solid var(--border-2); border-radius:8px; padding:9px 11px; width:100%;
  resize:vertical; min-height:38px;
}
.dfoot textarea:focus, .dfoot select:focus { outline:1px solid var(--accent); }
.dfoot input[type=datetime-local] { color-scheme:dark; }
.dfoot select {
  font:inherit; font-size:var(--fs-xs); color:var(--muted); background:var(--bg);
  border:1px solid var(--border-2); border-radius:7px; padding:6px 8px;
}
.dfoot .row { display:flex; gap:8px; align-items:center; }
.dfoot .send {
  font:inherit; font-size:var(--fs-sm); font-weight:600; color:var(--bg);
  background:var(--accent); border:none; border-radius:7px; padding:8px 16px; cursor:pointer;
}
.dfoot .send:hover { background:var(--accent-2); }
.dfoot .send:disabled { opacity:.5; cursor:default; }
.dnote { color:var(--muted-2); font-size:var(--fs-xs); line-height:1.55; }
.dnote b { color:var(--yellow); }
.dresult { font-size:var(--fs-sm); color:var(--muted); background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; line-height:1.6; }
.dresult code { font-family:var(--mono); color:var(--cyan); }
.logrow { border:1px solid var(--border); border-radius:8px; padding:8px 11px; margin-top:7px;
  background:var(--bg); font-size:var(--fs-xs); }
.logrow .lt { color:var(--muted-2); }
.logrow .ls { font-weight:600; margin-left:8px; font-size:var(--fs-2xs); }
.logrow .ls.on { color:var(--green); }
.logrow .ls.off { color:var(--muted-2); }
.logrow .lm { color:var(--cyan); margin-left:8px; }
.logrow .lchat { margin-left:8px; float:right; padding:2px 8px; font-size:var(--fs-2xs); }
.logrow .lwait { margin-left:8px; float:right; color:var(--muted-2); font-size:var(--fs-2xs); }
/* the brief stays clamped until clicked — full text on demand, not by default */
.logrow .lx { color:var(--muted); margin-top:4px; line-height:1.5; cursor:pointer;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.logrow .lx.open { -webkit-line-clamp:unset; display:block; }
/* what you just launched, lifted out of the input and parked above it */
.sent { border:1px solid var(--green); border-radius:9px; padding:9px 12px;
  margin-bottom:12px; background:var(--bg); }
.sent.bad { border-color:var(--accent); }
.sent .sentbar { display:flex; align-items:center; gap:10px; font-size:var(--fs-2xs);
  font-weight:600; margin-bottom:5px; }
.sent .sl { color:var(--green); }
.sent.bad .sl { color:var(--accent); }
.sent .sn { color:var(--muted-2); font-weight:400; }
.sent .sentbar .abtn { margin-left:auto; padding:2px 8px; }
.sent .sentx { color:var(--fg); font-size:var(--fs-sm); line-height:1.5; white-space:pre-wrap; }
.proglive { border:1px solid var(--accent); border-radius:9px; padding:10px 12px;
  margin-bottom:14px; background:var(--bg); box-shadow:0 0 0 1px var(--accent-glow); }
.progline { font-size:var(--fs-sm); line-height:1.6; color:var(--fg); }
.progline.sub { color:var(--muted); padding-left:12px; }
.progline .c { color:var(--cyan); }

.gitline { padding:9px 14px 0; display:flex; flex-wrap:wrap; gap:8px 14px; align-items:baseline; font-size:var(--fs-sm); }
.gitline .branch { color:var(--cyan); font-weight:600; }
.gitline .branch::before { content:" "; color:var(--muted-2); }
.gitline .delta { color:var(--yellow); }
.gitline .sync-count { color:var(--muted); }
.commit { padding:4px 14px 0; color:var(--muted); font-size:var(--fs-sm);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.commit .hash { color:var(--accent-2); }

.sessions { padding:10px 8px 10px; display:flex; flex-direction:column; gap:6px; }
.sess {
  border:1px solid var(--border); border-left-width:3px; border-radius:8px;
  padding:8px 10px; background:var(--bg-2); font-size:var(--fs-sm);
}
.sess .row1 { display:flex; flex-wrap:wrap; gap:6px 10px; align-items:baseline; }
.st { font-weight:600; font-size:var(--fs-2xs); letter-spacing:var(--track); white-space:nowrap; }
.sess.working      { border-left-color:var(--green); }
.sess.limit        { border-left-color:var(--yellow); }
.sess.needs_input,
.sess.blocked      { border-left-color:var(--accent); }
.sess.waiting      { border-left-color:var(--accent-2); }
.sess.ended        { border-left-color:var(--border-2); opacity:.55; }
.st.working  { color:var(--green); }
.st.working .g { animation:blink 1.2s steps(1) infinite; }
.st.needs_input { color:var(--accent); }
.st.limit    { color:var(--yellow); }
.st.blocked  { color:var(--yellow); }
.st.waiting  { color:var(--accent-2); }
.st.ended    { color:var(--muted-2); }
.acct { color:var(--cyan); font-size:var(--fs-xs); }
.meta { color:var(--muted-2); font-size:var(--fs-xs); }
/* Hook-backed sessions (ADR 0007). QUIET ON PURPOSE. Most people's agents are
   not hooked and never will be — an agent you started yourself cannot be — so
   this must read as "this one is extra sure", never as "the others are
   suspect". A dim dot after the status, and the tooltip carries the sentence.
   `.observed` is the brighter half: the status we are showing IS what the CLI
   said. `.inferred` is a hooked session whose hook the ladder overruled. */
.hookdot { font-size:var(--fs-2xs); cursor:help; }
.hookdot.observed { color:var(--green); opacity:.85; }
.hookdot.inferred { color:var(--muted-2); opacity:.6; }
.subdir { color:var(--yellow); font-size:var(--fs-xs); }
.topic { color:var(--fg); font-weight:500; margin-top:4px; font-size:var(--fs-sm);
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.said { color:var(--muted); margin-top:3px; font-size:var(--fs-sm); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.said::before { content:"⏎ "; color:var(--muted-2); }
.you { color:var(--cyan); margin-top:3px; font-size:var(--fs-sm); line-height:1.55;
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.you::before { content:"→ "; color:var(--muted-2); }
.subag { color:var(--green); font-size:var(--fs-xs); }
.wsaid { color:var(--muted); margin-top:3px; font-size:var(--fs-sm); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.wsaid::before { content:"⚙ "; color:var(--green); }
.pending { color:var(--yellow); font-size:var(--fs-xs); margin-top:3px; }
.pending.closeout { margin:4px 0 3px; }   /* closeout note sits between card-head and gitline */
.hand { color:var(--green); font-size:var(--fs-xs); margin-top:3px; }
.none { color:var(--muted-2); font-size:var(--fs-sm); padding:2px 6px 6px; }

/* ---- footer ---- */
.other { margin-top:20px; color:var(--muted); font-size:var(--fs-sm); }
.other h3 { font-size:var(--fs-2xs); font-weight:500; letter-spacing:var(--track); text-transform:uppercase; color:var(--muted-2); margin-bottom:6px; }
.controls { display:flex; gap:18px; margin:18px 0 6px; color:var(--muted); font-size:var(--fs-sm); flex-wrap:wrap; }
.controls label { cursor:pointer; user-select:none; }
.controls input { accent-color:var(--accent); margin-right:5px; vertical-align:-1px; }
</style>
</head>
<body>
<header><div class="wrap nav">
  <div class="brand"><span class="prompt" id="brandUser">fleet</span><span class="path">:~</span><span class="prompt">$</span> <span class="cmd">./orchestra --watch</span></div>
  <div class="navr">
  <button id="missionBtn" onclick="openMission()">🚀 new mission</button>
  <div class="sync" id="sync"><span class="dot"></span><span id="syncText">connecting…</span><span id="holdNote"
    title="the board wants to re-sort, but never moves cards while your pointer is on it — it re-sorts when you move away"></span></div></div>
</div></header>

<div id="drawer">
  <div class="dhead"><div><div class="t" id="dtitle"></div><div class="sub" id="dsub"></div></div>
    <button onclick="closeDrawer()">✕</button></div>
  <div id="dbody"></div>
  <div class="dfoot" id="dfoot"></div>
</div>

<nav class="side">
  <a href="/" class="active"><span class="g">⌗</span>board</a>
  <a href="/map"><span class="g">⌁</span>map</a>
  <a href="/limits"><span class="g">◔</span>limits</a>
  <a href="/pair"><span class="g">⚿</span>devices</a>
  <a href="/guide"><span class="g">?</span>guide</a>
</nav>

<div class="wrap content">
  <div class="tiles" id="tiles"></div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <label><input type="checkbox" id="showEnded"> show ended sessions</label>
    <label><input type="checkbox" id="bell"> ␇ bell when an agent needs you</label>
  </div>
  <div class="other" id="other"></div>
</div>
<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
// esc() is for HTML text/attribute nodes; a value dropped into a JS string
// inside an inline onclick needs the JS-string layer too, or an apostrophe in a
// worktree name (esc'd to &#39;, which the parser decodes back to ') breaks out
// of the quotes and can inject. JSON.stringify does the JS escaping AND supplies
// the surrounding quotes; esc() then makes the result safe as an HTML attribute
// value. Emits its own quotes, so call it WITHOUT wrapping quotes: openChat(${escArg(k)}).
const escArg = (s) => esc(JSON.stringify(String(s ?? "")));

// The terminal chip for one session. It sits on the session row rather than the
// card head so a worktree running several agents says which window is which —
// the pairing comes from the process's CLAUDE_CONFIG_DIR matching the session's
// account. A fallback pairing (no account match) is marked as a guess.
// Every actuator call carries a DURABLE address, never a bare pid: the button
// is rendered once and clicked whenever, and by then the kernel may have handed
// that pid to a different agent (ADR 0008). `addr` is the address the server
// re-resolves — a worktree for anything on a card, a cwd for the loose
// processes strip — with the pid riding along only as a hint.
function addr(o) {
  return Object.entries(o).filter(([, v]) => v != null && v !== "")
    .map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&");
}
function procChip(p, { certain = true, title, wt, cwd } = {}) {
  return `<button class="pidbtn${certain ? "" : " guess"}" onclick="focusPid(${p.pid}, '${esc(addr({ wt, cwd, tmux: p.tmux, tty: p.tty }))}')"
    title="${esc(title || "jump to this terminal")}">⌖ ${p.pid}${p.tty ? ` <span class="tt">${esc(p.tty)}</span>` : ""}${p.host ? ` ${esc(p.host)}` : ""}</button>`;
}
function sessProc(w, s) {
  if (!s.pid) return "";
  const p = w.live_procs.find(x => x.pid === s.pid);
  if (!p) return "";
  return procChip(p, {
    wt: w.name,
    certain: s.pid_certain,
    title: s.pid_certain
      ? `jump to this session's terminal — [${s.account}] on ${p.tty || p.host || "tmux"}`
      : `best guess: no process advertises account [${s.account}] in this worktree`,
  });
}

const STATUS = {
  working:     { glyph:"●", label:"WORKING" },
  needs_input: { glyph:"▲", label:"NEEDS ANSWER" },
  limit:       { glyph:"⛔", label:"LIMIT HIT" },
  blocked:     { glyph:"■", label:"BLOCKED · pending tool" },
  waiting:     { glyph:"◆", label:"YOUR TURN · idle @ prompt" },
  ended:       { glyph:"○", label:"ENDED" },
};
const AVAIL = { free:"FREE", busy:"BUSY", attention:"NEEDS YOU", waiting:"WAITING" };

function rel(s) {
  if (s == null) return "—";
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h" + Math.floor((s%3600)/60) + "m";
  return Math.floor(s/86400) + "d";
}

// ---- ages animate locally, off an absolute stamp ---------------------------
// Sessions carry `last_write_at` (an absolute unix float — ENGINE.md §3.4) and
// NOTHING ELSE about time: the `age_s` that used to ride beside it is off the
// wire. So "wrote 12s ago" is the CLIENT's arithmetic against Date.now(), not a
// number the server counted down for us. Rendering the server's age froze it
// for the whole 5s poll interval and then jumped; this ticks every second with
// no round-trip. Same idiom as the resume countdown below.
// The age is deliberately NOT in the card's html string: html that moved every
// second made the keyed diff rewrite every live card on every tick. Card html
// is now time-invariant, and only this one text node moves.
function setAgeState(el) {
  const since = parseFloat(el.dataset.since);
  if (!isFinite(since)) { el.textContent = "—"; return; }   // no stamp: say so
  el.textContent = rel(Math.max(0, Math.floor(Date.now() / 1000 - since))) + " ago";
}
function stampAges() { document.querySelectorAll(".age").forEach(setAgeState); }
setInterval(stampAges, 1000);

// ---- countdowns animate locally too, off an absolute stamp ----------------
// Same rule, same reason (ENGINE.md §3.4). Sessions carry `limit.resets_at` —
// an absolute unix float — and no `resets_in`. The countdown the server used
// to send was frozen at the cclimits fetch and then cached for 300s, so a card
// could sit insisting "resets in 12m" for five minutes after the limit had
// already cleared, and nothing on the payload said how old the number was.
// As with the age, the text is NEVER in the card's html string: a value that
// moved every second would make the keyed diff rewrite every limit card on
// every tick. `data-until` is time-invariant, so the html is too.
function setUntilState(el) {
  const until = parseFloat(el.dataset.until);
  if (!isFinite(until)) { el.textContent = ""; return; }
  const left = until - Date.now() / 1000;
  el.textContent = (el.dataset.prefix || "")
    + (left > 0 ? "in " + rel(Math.ceil(left)) : "now");
}
function stampUntils() { document.querySelectorAll(".until").forEach(setUntilState); }

let lastAttn = null;
let bellCtx = null;
function maybeBell(attn) {
  if ($("bell").checked && lastAttn != null && attn > lastAttn) {
    try {
      // One shared AudioContext, reused across rings. A fresh one per ring
      // leaks — browsers cap the number of live contexts (~6), after which
      // `new AudioContext()` throws and the bell goes permanently silent, on
      // exactly the busy fleet that rings it most. Resume it if the autoplay
      // policy suspended it before the first user gesture.
      bellCtx = bellCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (bellCtx.state === "suspended") bellCtx.resume();
      const ctx = bellCtx;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "square"; o.frequency.value = 880;
      g.gain.setValueAtTime(.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + .35);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + .36);
    } catch (e) {}
  }
  lastAttn = attn;
}

const REG = {};
let SCHED = {};   // armed auto-resumes, keyed `worktree|sid` (from /api/state)
function render(st) {
  const now = st.generated_at;
  $("brandUser").textContent = `${st.user || "you"}@fleet`;
  SCHED = st.resumes || {};
  for (const w of st.worktrees)
    for (const s of w.sessions)
      REG[`${w.name}|${s.sid}`] = { s, procs: w.live_procs, wt: w.name };
  const c = st.counts;
  // limit-stuck agents are NOT actionable — they never ring the bell or
  // count as "need you"; they get their own tile with the next reset
  const attn = c.needs_input + c.blocked + c.waiting;
  maybeBell(attn);
  document.title = attn > 0 ? `(${attn}!) orchestra` : "orchestra";

  const resets = st.worktrees.flatMap(w => w.sessions)
    .filter(s => s.status === "limit" && !s.handed_to && s.limit && s.limit.resets_at != null)
    .map(s => s.limit.resets_at);
  const freeNames = st.free_worktrees || [];
  $("tiles").innerHTML = `
    <div class="tile ok"><div class="k">● working</div><div class="v">${c.working}</div><div class="sub">agents mid-turn</div></div>
    <div class="tile ${attn ? "attn" : ""}"><div class="k">▲ need you</div><div class="v">${attn}</div>
      <div class="sub">${c.needs_input} question · ${c.blocked} blocked · ${c.waiting} idle</div></div>
    <div class="tile"><div class="k">⛔ waiting on limits</div><div class="v">${c.limit || 0}</div>
      <div class="sub">${resets.length ? `<span class="until" data-until="${Math.min(...resets)}" data-prefix="next reset "></span>` : "agents resume on reset"}${(n => n ? " · ⏱ " + n + " armed" : "")(Object.values(SCHED).filter(r => r.status === "pending").length)}</div></div>
    <div class="tile free"><div class="k">◇ free worktrees</div><div class="v">${freeNames.length}</div>
      <div class="sub" title="${esc(freeNames.join(", "))}">${esc(freeNames.join(", ") || "none — everything busy")}</div></div>
    <div class="tile"><div class="k">⌁ live agents</div><div class="v">${st.worktrees.reduce((n,w)=>n+w.live_procs.length,0) + st.other_procs.length}</div>
      <div class="sub">claude processes on ${esc(st.hostname)}</div></div>`;

  reconcileGrid(st, (w) => {
    const g = w.git || {};
    const sync = (g.ahead != null) ? `<span class="sync-count">↑${g.ahead} ↓${g.behind}</span>` : "";
    const dirty = g.dirty ? `<span class="delta">Δ${g.dirty} uncommitted</span>` : "";
    const commit = g.commit ? `<span class="hash">${esc(g.commit.hash)}</span> · ${rel(Math.max(0, Math.floor(now - g.commit.ts)))} ago · ${esc(g.commit.subject)}` : "no commits";
    const showEnded = $("showEnded").checked;
    const sess = w.sessions.filter(s => showEnded || s.status !== "ended");
    // pids the sessions below account for, so the card head only carries the
    // leftovers rather than repeating every terminal in the worktree
    const claimed = new Set(w.sessions.map(s => s.pid).filter(Boolean));
    const rows = sess.map(s => {
      const stt = { ...STATUS[s.status] };
      // the label is the time-invariant half; the countdown is its own node,
      // stamped by the 1s ticker off the absolute `resets_at` (see setUntilState)
      if (s.status === "limit" && s.limit)
        stt.label = `LIMIT HIT · ${s.limit.worst || "usage"}`;
      const resetTick = (s.status === "limit" && s.limit && s.limit.resets_at != null)
        ? `<span class="until" data-until="${s.limit.resets_at}" data-prefix=" · resets "></span>` : "";
      const pend = (s.status !== "working" && s.pending_tools.length)
        ? `<div class="pending">⧗ waiting on: ${esc(s.pending_tools.join(", "))}</div>` : "";
      // ADR 0007. `hooked` says the CLI is talking to us about this session;
      // `status_src` says whether THIS answer is the one it gave. The two are
      // separate because a hooked session whose `Stop` lost to a live
      // background shell is still inferred, and saying otherwise would be the
      // board claiming a certainty it does not have.
      const hookDot = s.hooked
        ? `<span class="hookdot ${s.status_src === "observed" ? "observed" : "inferred"}" title="${
            s.status_src === "observed"
              ? "observed — Claude Code's own hook reported this status"
              : "hook-backed session, but this status came from inference (the hook was outranked)"
          }">◦</span>` : "";
      return `<div class="sess ${s.status}">
        <div class="row1">
          <span class="st ${s.status}"><span class="g">${stt.glyph}</span> ${stt.label}${resetTick}</span>${hookDot}
          <span class="acct">[${esc(s.account)}]</span>
          <span class="meta">${esc(s.model || "?")}</span>
          <span class="meta age" data-since="${s.last_write_at != null ? s.last_write_at : ""}"></span>
          ${s.subdir ? `<span class="subdir">./${esc(s.subdir)}</span>` : ""}
          ${s.branch && s.branch !== g.branch ? `<span class="meta"> ${esc(s.branch)}</span>` : ""}
          ${s.subagents_active ? `<span class="subag">⚙ subagents running</span>`
            : s.pending_workflows ? `<span class="subag">⚙ awaiting ${s.pending_workflows} workflow${s.pending_workflows > 1 ? "s" : ""}</span>`
            : s.pending_bg_agents ? `<span class="subag">⚙ awaiting ${s.pending_bg_agents} background agent${s.pending_bg_agents > 1 ? "s" : ""}</span>`
            : s.pending_bg_tools ? `<span class="subag">⚙ awaiting ${s.pending_bg_tools} background task${s.pending_bg_tools > 1 ? "s" : ""}</span>`
            : s.tool_running ? `<span class="subag">⚙ running: ${esc(s.bg_shell ? "background shell" : (s.pending_tools[0] || "tool"))}</span>` : ""}
          <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
            ${sessProc(w, s)}
            ${s.status === "limit" && s.limit && s.limit.group === "session" && s.limit.resets_at
              ? `<button class="abtn resume" data-key="${esc(w.name)}|${esc(s.sid)}" data-until="${s.limit.resets_at}">▶ resume</button>` : ""}
            ${s.status === "limit" && !s.handed_to ? schedControls(w, s) : ""}
            <button class="abtn" onclick="openChat(${escArg(`${w.name}|${s.sid}`)})">✉ chat</button>
          </span>
        </div>
        ${s.topic ? `<div class="topic">${esc(s.topic)}</div>` : ""}
        ${s.last_user && s.last_user !== s.topic ? `<div class="you">${esc(s.last_user)}</div>` : ""}
        ${s.last_assistant ? `<div class="said">${esc(s.last_assistant)}</div>` : ""}
        ${s.subagent_said ? `<div class="wsaid" title="latest subagent report">${esc(s.subagent_said)}</div>` : ""}
        ${s.handed_to ? `<div class="hand">↳ work continued by [${esc(s.handed_to)}] — this terminal can be closed</div>` : ""}
        ${pend}
      </div>`;
    }).join("");
    const finArmed = window._armFinish && window._armFinish.wt === w.name && Date.now() < window._armFinish.until;
    // closeout in flight → a persistent note between card-head and gitline. It
    // survives a page reload (closeout_sent + git.dirty come from the state
    // payload); the FIN_PENDING part is client-only and adds the refusal reason.
    let note = "";
    if (w.closeout_sent) {
      const fin = FIN_PENDING[w.name];
      let body = `⧗ closeout pending — brief sent ${rel(Math.max(0, Math.floor(now - w.closeout_sent)))} ago`;
      if (g.dirty) body += ` · Δ${g.dirty} uncommitted`;
      if (fin) body += ` · blocked: ${esc(fin.left)}`;
      const ttl = (fin && fin.files && fin.files.length) ? ` title="${esc(fin.files.join("\n"))}"` : "";
      note = `<div class="pending closeout"${ttl}>${body}</div>`;
    } else {
      // no closeout_sent on this render clears the entry — a clean close, the
      // terminal dying on its own, or a fresh mission. Here so a refactor of the
      // card-content path can't silently drop it.
      delete FIN_PENDING[w.name];
    }
    return `<div class="card-head">
        <span class="badge ${w.availability}">${AVAIL[w.availability]}</span>
        <span class="name">${esc(w.name)}</span>
        <span class="procs">${(() => {
          // terminals no session claims — an agent whose transcript hasn't been
          // written yet, or one running outside any tracked session
          const loose = w.live_procs.filter(p => !claimed.has(p.pid));
          if (loose.length) return loose.map(p => procChip(p, { wt: w.name, title: "live terminal in this worktree — not tied to a session yet" })).join("");
          return w.live_procs.length ? "" : `<span class="noproc">no live proc</span>`;
        })()}
          <button class="abtn finish ${finArmed ? "armed" : ""}" data-wt="${esc(w.name)}" ${w.closeout_sent ? 'data-close="1"' : ""}
            title="${w.closeout_sent
              ? `step 2 of finish — closeout brief sent ${rel(Math.floor(Date.now() / 1000 - w.closeout_sent))} ago; once the agent reports done, this verifies the landing and /exits it (never re-sends the brief)`
              : "close out: whatever's left gets done — already-landed work is never re-checked; card goes free"}">${
            w.closeout_sent ? (finArmed ? "✕ confirm" : "✕ close")
                            : (finArmed ? "✓ confirm" : "✓ finish")}</button></span>
      </div>
      ${note}
      <div class="gitline"><span class="branch">${esc(g.branch || "?")}</span>${dirty}${sync}</div>
      <div class="commit" title="${esc(g.commit ? g.commit.subject : "")}">${commit}</div>
      <div class="sessions">${rows || `<div class="none">${w.sessions.length ? w.sessions.length + " ended session(s) hidden" : "no recent sessions"}</div>`}</div>`;
  });

  // stamp countdown state on the fresh buttons NOW — waiting for the 1s
  // ticker flashed them clickable ("▶ resume") for up to a second per refresh
  document.querySelectorAll(".resume").forEach(setResumeState);
  // same reason for the ages and the reset countdowns: a card (or the tiles
  // row) rewritten by this render carries an empty span until something fills
  // it, so fill it in the same frame rather than a tick later
  stampAges();
  stampUntils();

  $("other").innerHTML = st.other_procs.length
    ? `<h3>other live agents (outside watched worktrees)</h3>` +
      st.other_procs.map(p => `<div>⌁ <button class="pidbtn" onclick="focusPid(${p.pid}, '${esc(addr({ cwd: p.cwd }))}')">⌖ ${p.pid}${p.tty ? ` <span class="tt">${esc(p.tty)}</span>` : ""}${p.host ? ` ${esc(p.host)}` : ""}</button> ${p.cpu.toFixed(1)}% cpu · up ${esc(p.etime)} · ${esc(p.cwd || "?")}</div>`).join("")
    : "";
}

// ---- grid reconciliation: cards never move under your cursor ---------------
// The board is triage-sorted, so cards MOVE when a status flips — and a card
// that swaps into place mid-aim takes a finish click meant for another one.
// Three layered defenses:
//   1. keyed per-card DOM — a tick rewrites only cards whose data changed,
//      never the whole grid, so the element under your cursor survives
//   2. layout holds while the pointer is on the board — re-sorts, arrivals
//      and removals wait for the cursor to leave (or the tab to hide), then
//      apply with a glide so the movement is visible, not a teleport
//   3. a click shield — a card that shifted in the last 600ms swallows the
//      first click on any of its buttons and names itself, so a click can
//      never silently land on a card that just moved into position
let gridHover = false, structureHeld = false;
let cardRects = new Map();   // wt -> page-coords position at the last render

function reconcileGrid(st, contentFor) {
  const grid = $("grid");
  const names = st.worktrees.map(w => w.name);
  const want = new Set(names);
  const have = new Map([...grid.children].map(el => [el.dataset.wt, el]));
  structureHeld = false;
  for (const [name, el] of have) {
    if (want.has(name)) continue;
    if (gridHover) structureHeld = true;   // removal shifts every card after it
    else { el.remove(); have.delete(name); }
  }
  for (const w of st.worktrees) {
    let el = have.get(w.name);
    if (!el) {
      el = document.createElement("div");
      el.className = "card";
      el.dataset.wt = w.name;
      grid.appendChild(el);   // the end of the grid never shifts existing cards
      have.set(w.name, el);
    }
    const html = contentFor(w);
    if (el._html !== html) { el._html = html; el.innerHTML = html; }
    el.classList.toggle("attention", w.availability === "attention");
  }
  const desired = names.filter(n => have.has(n));
  const current = [...grid.children].map(el => el.dataset.wt).filter(n => want.has(n));
  if (desired.join("\n") !== current.join("\n")) {
    if (gridHover) structureHeld = true;
    else flipReorder(grid, desired.map(n => have.get(n)));
  }
  $("holdNote").textContent = structureHeld ? " · ⌗ re-sort held" : "";
  stampMoves(grid);
}
// re-sort with the old positions animating into the new — movement you can track
function flipReorder(grid, ordered) {
  const before = new Map(ordered.map(el => [el, el.getBoundingClientRect()]));
  ordered.forEach(el => grid.appendChild(el));
  for (const el of ordered) {
    const b = before.get(el), a = el.getBoundingClientRect();
    const dx = b.left - a.left, dy = b.top - a.top;
    if (dx || dy) el.animate(
      [{ transform: `translate(${dx}px,${dy}px)` }, { transform: "none" }],
      { duration: 300, easing: "cubic-bezier(0.22,1,0.36,1)" });
  }
}
// page coordinates, not viewport — scrolling between renders is not a shift
function stampMoves(grid) {
  const next = new Map();
  for (const el of grid.children) {
    const r = el.getBoundingClientRect();
    const pos = { x: r.left + window.scrollX, y: r.top + window.scrollY };
    const prev = cardRects.get(el.dataset.wt);
    if (prev && (Math.abs(prev.x - pos.x) > 4 || Math.abs(prev.y - pos.y) > 4))
      el._movedAt = performance.now();
    next.set(el.dataset.wt, pos);
  }
  cardRects = next;
}
$("grid").addEventListener("pointerenter", () => { gridHover = true; });
$("grid").addEventListener("pointerleave", () => {
  gridHover = false;
  if (structureHeld && lastState) render(lastState);
});
document.addEventListener("visibilitychange", () => {
  if (!document.hidden || !gridHover) return;
  gridHover = false;   // nobody is aiming at a hidden tab — apply the re-sort
  if (structureHeld && lastState) render(lastState);
});
// the shield: capture-phase, so it runs before every button's own handler
document.addEventListener("click", (ev) => {
  const btn = ev.target.closest && ev.target.closest(".card button");
  if (!btn) return;
  const card = btn.closest(".card");
  if (card && card._movedAt && performance.now() - card._movedAt < 600) {
    ev.stopPropagation(); ev.preventDefault();
    toast(`⚠ the board shifted — that click landed on “${card.dataset.wt}”; click again if that's the card you meant`);
  }
}, true);

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 6000);
}
async function focusPid(pid, ident) {
  toast(`⌖ locating pid ${pid}…`);
  try {
    const r = await fetch(`/api/focus?pid=${pid}${ident ? "&" + ident : ""}`);
    const res = await r.json();
    toast((res.ok ? "" : "✗ ") + res.message);
  } catch (e) { toast("✗ focus request failed"); }
}

let lastState = null;
// The header is the board's only claim about its own liveness, so it names
// which of the two paths it is on. "live" means frames are arriving off
// /api/events and the five-second poll is retired; "polling" means the stream
// was refused or died and the board is asking for itself again. A board that
// silently stopped updating because a socket died would be far worse than one
// that polls, and this is where you can see which happened.
function showSync(s) {
  $("sync").classList.toggle("err", !!s.err);
  $("syncText").textContent =
    s.err ? "reconnecting…"
    : s.mode === "stream" ? `live · v${s.v}${s.tabs > 1 ? ` · ${s.tabs} tabs` : ""}`
    : s.mode === "poll" ? "polling · " + new Date().toLocaleTimeString()
    : "connecting…";
}
async function tick() {
  try {
    const r = await fetch("/api/state");
    lastState = await r.json();
    render(lastState);
    refreshMissionPickers();   // composer may be open and waiting on this
    showSync({ mode: "poll", tabs: 1 });
  } catch (e) {
    showSync({ mode: "poll", tabs: 1, err: true });
  }
}
$("showEnded").addEventListener("change", () => { localStorage.fbEnded = $("showEnded").checked ? "1" : ""; lastState && render(lastState); });
$("bell").addEventListener("change", () => { localStorage.fbBell = $("bell").checked ? "1" : ""; });
$("showEnded").checked = localStorage.fbEnded === "1";
$("bell").checked = localStorage.fbBell === "1";
// ---- drawer: chat with an agent / launch a mission -------------------------
let chatCtx = null, chatTimer = null;
function closeDrawer() {
  $("drawer").classList.remove("open", "wide");
  chatCtx = null;
  missionOpen = false;
  clearTimeout(chatTimer);
}
function reachableProcs(procs) { return procs.filter(p => p.reachable); }

function openChat(key) {
  const r = REG[key];
  if (!r) return;
  missionOpen = false;   // the drawer is the chat's now; don't rebuild its footer
  // the SAME identity the read path uses ({account, sid}) now also addresses
  // the write path — that asymmetry was the bug (ADR 0008). `wt` and `own`
  // ride along so a send at a terminal other than this session's own still
  // names a durable place instead of a bare pid.
  chatCtx = { key, account: r.s.account, sid: r.s.sid, wt: r.wt, own: r.s.pid };
  $("dtitle").textContent = `${r.wt} · [${r.s.account}]`;
  $("dsub").textContent = r.s.topic || r.s.sid;

document.addEventListener("click", async (ev) => {
  const b = ev.target.closest ? ev.target.closest(".finish") : null;
  if (!b) return;

  const closing = !!b.dataset.close;
  if (!armed) {
    window._armFinish = { wt, until: Date.now() + 6000 };
    // arm and disarm through real renders — a hand-edited button would fall
    // out of sync with the per-card html cache and outlive its 6s window
    if (lastState) render(lastState);
    setTimeout(() => { if (lastState) render(lastState); }, 6200);
    return;

      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ worktree: wt }) });

    // the server's refusal no longer says "…went to the agent 4m ago" — it sends
    // `sent`, the absolute epoch it briefed, and the elapsed part is worked out
    // here against this clock (ENGINE.md §3.4). The old string was computed
    // before the response was even serialised and never moved again.

    toast((d.ok ? "✓ " : "✗ ") + d.message + briefed);

    // why so the card can say so until it clears

      FIN_PENDING[wt] = { left: d.left || d.message, files: d.files || [], at: Date.now() };
      if (lastState) render(lastState);   // show the note now, not on the next tick
    }

    $("mLog").innerHTML = `<div class="dnote" style="margin-top:16px">recent dispatches — click one to read the full brief</div>` +
      d.entries.map(e => {
        const key = e.alive ? chatKeyForWorktree(e.worktree) : null;
        return `<div class="logrow">
        <span class="lt">${esc(logStamp(e))}</span>
        <span class="ls ${e.alive ? "on" : "off"}">${e.alive ? "● live" : "○ ended"}</span>
        <span class="lm">${esc(e.worktree || "?")} · [${esc(e.account || "?")}]${e.model ? " · " + esc(e.model) : ""}${e.effort ? " · " + esc(e.effort) : ""}${e.routed ? " · routed" : ""}</span>
        ${key ? `<button class="abtn lchat" onclick="event.stopPropagation();openChat(${escArg(key)})">✉ chat</button>`
              : e.alive ? `<span class="lwait">starting…</span>` : ""}
        <div class="lx" onclick="this.classList.toggle('open')">${esc(e.mission_original || "")}</div>
      </div>`; }).join("");
  } catch (e) {}
}
let dispatchPoll = null;
// the mission in flight — the composer's textarea is cleared the moment you
// launch, so this (not the input) is what relaunch/retry reads back.
let inFlight = null;
// a dedicated in-flight lock for the POST itself, separate from `inFlight`
// (which relaunch reuses on purpose). A double-click fires launchMission twice
// before the first fetch returns — the first call already cleared the textarea,
// so the second reads the same text back off `inFlight` and passes every guard.
// This lets the second call through the validation but stops it at the wire, so
// one launch is one /api/dispatch. Cleared in the finally, on every path.
let submitting = false;
function renderInFlight(note) {
  if (!inFlight) return;
  $("mSent").innerHTML = `<div class="sent">
    <div class="sentbar"><span class="sl">▸ launching</span>
      <span class="sn">${esc(note || "dispatching…")}</span></div>
    <div class="sentx">${esc(inFlight)}</div></div>`;
}
async function launchMission(missionArg) {
  // on a relaunch the textarea is already empty — fall back to the in-flight text
  const mission = (missionArg !== undefined ? missionArg
                                            : $("mText").value.trim()) || inFlight;
  if (!mission) { toast("✗ empty mission"); return; }
  // model & effort are the author's call now — refuse before touching the draft
  if (!$("mModel").value || !$("mEffort").value) {
    toast("✗ pick a model and an effort first"); return;
  }
  // a second click while the first POST is still in flight is dropped here —
  // after the guards (so a rejected launch never leaves the lock stuck) and
  // before the textarea is cleared, so the double-dispatch never reaches the wire
  if (submitting) return;
  submitting = true;
  inFlight = mission;
  $("mText").value = "";        // out of the input the instant you commit to it
  saveMissionDraft("");         // launched missions live in the dispatch log
  renderInFlight();
  const st = $("mStatus");
  st.innerHTML = `<div class="proglive"><div class="progline">▸ dispatching…</div></div>`;
  st.scrollIntoView({ block: "nearest" });
  try {
    const r = await fetch("/api/dispatch", { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mission, worktree: $("mWt").value, account: $("mAcct").value,
                             model: $("mModel").value, effort: $("mEffort").value,
                             force_model: !!window._forceModel }) });
    window._forceModel = false;
    const resp = await r.json();
    if (resp.needs_decision) { showModelDecision(resp); return; }
    const job = resp.job;
    if (!job) {   // refused before a job existed — put the text back
      toast("✗ " + (resp.message || "dispatch failed to start"));
      failedMission = inFlight; reeditMission();
      return;
    }
    // STAYS A POLL, deliberately, even though it is the fastest one here. A
    // dispatch job is not fleet state: the observer never sees it, so it moves
    // no version and could not ride /api/events however the frame were shaped.
    // It is also bounded in every direction — one job, in the one tab that
    // launched it, for the few seconds until `done` clears the interval — so it
    // is not what the connection budget has to survive. Streaming it would mean
    // teaching the observer to diff dispatch jobs: a second source of truth for
    // a thing that already has one.
    clearInterval(dispatchPoll);
    dispatchPoll = setInterval(() => pollDispatch(job), 1000);
    pollDispatch(job);
  } catch (e) { toast("✗ dispatch failed"); }
  finally { submitting = false; }   // release the lock on every path (incl. the
                                    // needs_decision return, so relaunch can re-enter)
}
function showModelDecision(resp) {
  const opusBtn = resp.can_opus
    ? `<button class="send" onclick="relaunch('opus', false)">▶ start with Opus${resp.opus_account ? ` — [${esc(resp.opus_account)}] ${resp.opus_left}% left` : ""}</button>`
    : `<span class="dnote">no account has Opus headroom either</span>`;
  $("mStatus").innerHTML = `<div class="proglive" style="border-color:var(--yellow);box-shadow:0 0 0 1px rgba(212,176,106,.25)">
    <div class="progline">⚠ ${esc(resp.message)}</div>
    <div class="progline sub">${esc(resp.model)} would run into a limit / reserve. choose:</div>
    <div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap">
      ${opusBtn}
      <button class="abtn" onclick="relaunch('${esc(resp.model)}', true)">⚑ use ${esc(resp.model)} anyway</button>
      <button class="abtn" onclick="$('mStatus').innerHTML=''">✕ cancel</button>
    </div></div>`;
  $("mStatus").scrollIntoView({ block: "nearest" });
}
async function relaunch(model, force) {
  const mSel = $("mModel"); if (mSel) mSel.value = (model === "opus" ? "opus" : model);
  window._forceModel = force;
  launchMission(inFlight);
}
// a failed dispatch must never eat what you wrote — put it back in the composer
let failedMission = null;
function reeditMission() {
  if (failedMission === null) return;
  $("mText").value = failedMission;
  saveMissionDraft(failedMission);
  failedMission = null;
  inFlight = null;
  $("mSent").innerHTML = "";
  $("mStatus").innerHTML = "";
  $("mText").focus();
}
async function pollDispatch(job) {
  try {
    const r = await fetch(`/api/dispatch/status?job=${job}`);
    const s = await r.json();
    if (!s.ok) return;
    const lines = (s.progress || []).map(l =>
      `<div class="progline${l.startsWith("  ") ? " sub" : ""}">${esc(l)}</div>`).join("");
    const d = s.result;
    let tail = "";
    if (s.done && d) {
      tail = d.ok
        ? `<div class="dresult" style="margin-top:8px">✓ ${esc(d.message)}<br>
           ${d.effort && d.effort_confirmed === false ? `<b style="color:var(--yellow)">⚠ effort not confirmed — check the session</b><br>` : ""}
           attach: <code>${esc(d.attach)}</code> · appears on the board in ~30s</div>`
        : `<div class="dresult" style="margin-top:8px">✗ ${esc(d.message)}</div>`;
    }
    // the dispatch thread's first progress line lands only after its worktree
    // scan — until then keep the "▸ dispatching…" placeholder rather than
    // overwriting it with an empty orange frame
    if (lines || tail)
      $("mStatus").innerHTML = `<div class="proglive">${lines}${tail}</div>`;
    if (s.done) {
      clearInterval(dispatchPoll);
      toast((d && d.ok ? "✓ " : "✗ ") + (d ? d.message : "done"));
      if (d && d.ok) {
        inFlight = null;
        $("mSent").innerHTML = "";     // it graduates into the dispatch list below
      } else if (inFlight) {
        failedMission = inFlight;
        saveMissionDraft(inFlight);  // a tab closed on a failure keeps the text
        $("mSent").innerHTML = `<div class="sent bad">
          <div class="sentbar"><span class="sl">✗ not launched</span>
            <button class="abtn" onclick="reeditMission()">↩ edit again</button></div>
          <div class="sentx">${esc(failedMission)}</div></div>`;
      }
      loadDispatchLog();
    }
  } catch (e) {}
}

// prime the server's cclimits cache so exhausted accounts surface as ⛔ LIMIT
function primeLimits() {
  return fetch("/api/limits").then(r => r.json())
    // re-render from the state we already have — refetching it here would run
    // the expensive worktree/git/tmux scan a second time on every boot
    .then(d => { LIMITS = d; if (lastState) render(lastState); refreshMissionPickers(); })
    .catch(() => {});
}

// ---- the board is TOLD, not asked ------------------------------------------
//
// ONE EventSource per BROWSER, held in a SharedWorker (stream.js) and fanned to
// every tab. This tab holds no socket of its own: browsers allow six
// connections per origin, so a stream per tab would starve the POSTs at three
// tabs and deadlock at six — the server was measured to 32 concurrent streams
// and it is the BROWSER that is the ceiling here (ENGINE.md §5.4).
//
// Everything below is about what happens when that is not available, because
// sometimes it is not: Safari has shipped without SharedWorker in private
// browsing, and a worker script fails ASYNCHRONOUSLY, so "the constructor did
// not throw" is not proof of anything. Detect and degrade — polling is not a
// legacy path, it is the floor.
let stateWorker = null, fellBack = false;
function fallBackToPolling(why) {
  if (fellBack) return;
  fellBack = true;
  stateWorker = null;
  console.info("orchestra: state stream unavailable (" + why + ") — polling");
  tick();
  setInterval(tick, 5000);
}
// A mutation just landed and the server dropped its state cache, so ask NOW
// rather than on the next cadence — and ask through the WORKER, so the other
// tabs see the result of this click too instead of waiting out their own.
function requestRefresh() {
  if (stateWorker && !fellBack) stateWorker.port.postMessage({ cmd: "refresh" });
  else tick();
}
function startStateWorker() {
  if (typeof SharedWorker !== "function") return false;
  let w;
  try { w = new SharedWorker("/stream.js", { name: "orchestra-state" }); }
  catch (e) { return false; }
  stateWorker = w;
  let heard = false;
  w.port.onmessage = (ev) => {
    if (fellBack) return;
    heard = true;
    const m = ev.data || {};
    // The delta was applied in the WORKER, so what arrives here is one
    // complete, ordered fleet state — byte-shaped exactly like /api/state.
    // render() is therefore fed what it has always been fed, and every
    // invariant it earned (keyed per-card diffing, the re-sort hold, controls
    // that are refreshed rather than rebuilt) is untouched by this step.
    if (m.st) { lastState = m.st; render(lastState); refreshMissionPickers(); }
    if (m.status) showSync(m.status);
  };
  w.onerror = () => fallBackToPolling("worker error");
  w.port.start();
  // a worker that never speaks is indistinguishable from no worker at all
  setTimeout(() => { if (!heard) fallBackToPolling("silent worker"); }, 5000);
  addEventListener("pagehide", () => {
    try { w.port.postMessage({ cmd: "bye" }); } catch (e) {}
  });
  return true;
}
if (!startStateWorker()) fallBackToPolling("no SharedWorker");

// STAYS A POLL, deliberately. /api/limits is not observed state — the sweep
// explicitly does not probe cclimits (that is step 7), so there is no version
// for it to move and nothing to stream. It is already cached server-side, and
// at one request per tab per five minutes there is nothing to win by moving it.
primeLimits();
setInterval(primeLimits, 300000);

// deep link: /?mission opens the composer, /?mission=<text> prefills it.
// Opens immediately — the pickers fill themselves in as the fetches land, so
// there's nothing to wait for and you can start typing straight away.
const _mq = new URLSearchParams(location.search).get("mission");
if (_mq !== null) { openMission(); if (_mq) { $("mText").value = _mq; saveMissionDraft(_mq); } }
</script>
</body>
