<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fleetboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23d97757%22 font-family=%22monospace%22>⌁</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0d0d0d; --bg-2:#111111; --surface:#161616; --surface-2:#1c1c1c;
  --border:#2a2a2a; --border-2:#3a3a3a;
  --fg:#e8e6e3; --muted:#8a8784; --muted-2:#6a6764;
  --accent:#d97757; --accent-2:#e8a87c; --green:#87b386; --cyan:#7fb3c8; --yellow:#d4b06a;
  --accent-glow:rgba(217,119,87,.25); --green-glow:rgba(135,179,134,.18);
  --mono:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
* { box-sizing:border-box; margin:0; padding:0; }
html { background:var(--bg); }
body {
  font-family:var(--mono); font-size:13.5px; color:var(--fg);
  background:
    radial-gradient(1200px 500px at 70% -10%, rgba(217,119,87,.05), transparent 60%),
    var(--bg);
  min-height:100vh; padding-bottom:60px;
  -webkit-font-smoothing:antialiased;
}
.wrap { max-width:1500px; margin-inline:auto; padding-inline:22px; }

/* ---- header ---- */
header {
  position:sticky; top:0; z-index:10;
  background:color-mix(in oklab, var(--bg) 86%, transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.nav { display:flex; align-items:center; justify-content:space-between; height:52px; gap:16px; }
.brand { font-weight:700; white-space:nowrap; overflow:hidden; }
.brand .prompt { color:var(--accent); }
.brand .path { color:var(--cyan); }
.brand .cmd { color:var(--fg); }
.brand .cursor { display:inline-block; width:8px; height:15px; background:var(--accent);
  vertical-align:-2px; margin-left:2px; animation:blink 1.1s steps(1) infinite; }
@keyframes blink { 50% { opacity:0; } }
.navr { display:flex; align-items:center; gap:10px; }
.maplink { color:var(--muted); text-decoration:none; padding:6px 11px; border-radius:6px;
  font-size:13px; transition:color .2s var(--ease), background .2s var(--ease); }
.maplink::before { content:"~/"; color:var(--muted-2); }
.maplink:hover { color:var(--fg); background:var(--surface); }
.sync { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:12px; white-space:nowrap; }
.sync .dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green-glow); }
.sync.err .dot { background:var(--accent); }

/* ---- side nav ---- */
.side { position:fixed; left:0; top:52px; bottom:0; width:118px; z-index:9;
  padding:16px 10px; display:flex; flex-direction:column; gap:5px;
  border-right:1px solid var(--border); background:var(--bg-2); }
.side a { color:var(--muted); text-decoration:none; font-size:12.5px; font-weight:600;
  padding:8px 12px; border-radius:7px; display:flex; gap:9px; align-items:baseline;
  transition:color .2s var(--ease), background .2s var(--ease); }
.side a .g { color:var(--muted-2); }
.side a:hover { color:var(--fg); background:var(--surface); }
.side a.active { color:var(--fg); background:var(--surface); box-shadow:inset 2px 0 0 var(--accent); }
.side a.active .g { color:var(--accent); }
.content { margin-left:118px; }
@media (max-width:860px) {
  .side { position:static; width:auto; flex-direction:row; border-right:none;
    border-bottom:1px solid var(--border); padding:8px 22px; }
  .content { margin-left:0; }
}

/* ---- stat tiles ---- */
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; margin:18px 0; }
.tile {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px;
}
.tile .k { font-size:11px; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; }
.tile .v { font-size:26px; font-weight:800; margin-top:2px; }
.tile .sub { font-size:11.5px; color:var(--muted); margin-top:2px; min-height:15px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tile.attn { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow), 0 0 18px var(--accent-glow); }
.tile.attn .v { color:var(--accent); }
.tile.ok .v { color:var(--green); }
.tile.free .v { color:var(--cyan); }

/* ---- worktree cards ---- */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(430px,1fr)); gap:12px; }
@media (max-width:520px){ .grid { grid-template-columns:1fr; } }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; transition:border-color .25s var(--ease);
}
.card.attention { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow); }
.card-head {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--surface-2); border-bottom:1px solid var(--border);
}
.card-head .name { font-weight:800; font-size:15px; }
.badge {
  font-size:10px; font-weight:800; letter-spacing:.1em; padding:3px 8px;
  border-radius:5px; border:1px solid; white-space:nowrap;
}
.badge.free  { color:var(--cyan);   border-color:var(--cyan);   background:rgba(127,179,200,.12); }
.badge.busy  { color:var(--green);  border-color:var(--green);  background:var(--green-glow); }
.badge.attention { color:var(--accent); border-color:var(--accent); background:var(--accent-glow);
  animation:pulse 1.6s var(--ease) infinite; }
@keyframes pulse { 50% { box-shadow:0 0 10px var(--accent-glow); } }
.card-head .procs { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.card-head .noproc { color:var(--muted-2); font-size:11.5px; }
.pidbtn {
  font:inherit; font-size:10.5px; color:var(--muted); background:var(--bg-2);
  border:1px solid var(--border-2); border-radius:5px; padding:2.5px 8px; cursor:pointer;
  transition:border-color .15s var(--ease), color .15s var(--ease); white-space:nowrap;
}
.pidbtn:hover { color:var(--fg); border-color:var(--accent); }
.pidbtn .tt { color:var(--cyan); }
#toast {
  position:fixed; right:18px; bottom:18px; z-index:50; max-width:440px;
  background:var(--surface-2); border:1px solid var(--accent); border-radius:9px;
  padding:10px 14px; font-size:12.5px; color:var(--fg); display:none;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* ---- action buttons ---- */
.abtn {
  font:inherit; font-size:10.5px; font-weight:700; color:var(--muted);
  background:var(--bg-2); border:1px solid var(--border-2); border-radius:5px;
  padding:2px 8px; cursor:pointer; transition:all .15s var(--ease);
}
.abtn:hover { color:var(--fg); border-color:var(--accent); }
.abtn:disabled { opacity:.45; cursor:default; }
.abtn.armed { color:var(--green); border-color:var(--green); animation:pulse 1.6s var(--ease) infinite; }
#missionBtn {
  font:inherit; font-size:12px; font-weight:800; color:var(--accent);
  background:var(--bg-2); border:1px solid var(--accent); border-radius:7px;
  padding:6px 13px; cursor:pointer; transition:all .15s var(--ease);
}
#missionBtn:hover { background:var(--accent); color:var(--bg); }

/* ---- drawer (chat / mission) ---- */
#drawer {
  position:fixed; top:52px; right:0; bottom:0; width:460px; z-index:30;
  background:var(--bg-2); border-left:1px solid var(--border-2);
  box-shadow:-18px 0 50px rgba(0,0,0,.55);
  display:none; flex-direction:column;
}
#drawer.open { display:flex; }
.dhead { display:flex; align-items:center; gap:10px; padding:12px 16px;
  border-bottom:1px solid var(--border); background:var(--surface); }
.dhead .t { font-weight:800; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dhead .sub { color:var(--muted-2); font-size:11px; }
.dhead button { margin-left:auto; font:inherit; background:none; border:none;
  color:var(--muted); font-size:16px; cursor:pointer; }
.dhead button:hover { color:var(--fg); }
#dbody { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.msg { font-size:12px; line-height:1.5; border-radius:8px; padding:8px 11px; max-width:95%; }
.msg.you { background:var(--surface-2); border:1px solid var(--border-2); align-self:flex-end; color:var(--fg); }
.msg.you::before { content:"❯ "; color:var(--accent); font-weight:700; }
.msg.agent { background:var(--surface); border:1px solid var(--border); align-self:flex-start; color:var(--muted); }
.msg.agent::before { content:"⏎ "; color:var(--green); }
.dfoot { border-top:1px solid var(--border); padding:12px 14px; background:var(--surface);
  display:flex; flex-direction:column; gap:8px; }
.dfoot textarea, .dfoot input[type=text] {
  font:inherit; font-size:12.5px; color:var(--fg); background:var(--bg);
  border:1px solid var(--border-2); border-radius:8px; padding:9px 11px; width:100%;
  resize:vertical; min-height:38px;
}
.dfoot textarea:focus, .dfoot select:focus { outline:1px solid var(--accent); }
.dfoot select {
  font:inherit; font-size:11.5px; color:var(--muted); background:var(--bg);
  border:1px solid var(--border-2); border-radius:7px; padding:6px 8px;
}
.dfoot .row { display:flex; gap:8px; align-items:center; }
.dfoot .send {
  font:inherit; font-size:12px; font-weight:800; color:var(--bg);
  background:var(--accent); border:none; border-radius:7px; padding:8px 16px; cursor:pointer;
}
.dfoot .send:hover { background:var(--accent-2); }
.dfoot .send:disabled { opacity:.5; cursor:default; }
.dnote { color:var(--muted-2); font-size:10.5px; line-height:1.5; }
.dnote b { color:var(--yellow); }
.dresult { font-size:12px; color:var(--muted); background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; line-height:1.6; }
.dresult code { color:var(--cyan); }

.gitline { padding:9px 14px 0; display:flex; flex-wrap:wrap; gap:8px 14px; align-items:baseline; font-size:12.5px; }
.gitline .branch { color:var(--cyan); font-weight:600; }
.gitline .branch::before { content:" "; color:var(--muted-2); }
.gitline .delta { color:var(--yellow); }
.gitline .sync-count { color:var(--muted); }
.commit { padding:4px 14px 0; color:var(--muted); font-size:12px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.commit .hash { color:var(--accent-2); }

.sessions { padding:10px 8px 10px; display:flex; flex-direction:column; gap:6px; }
.sess {
  border:1px solid var(--border); border-left-width:3px; border-radius:8px;
  padding:8px 10px; background:var(--bg-2); font-size:12px;
}
.sess .row1 { display:flex; flex-wrap:wrap; gap:6px 10px; align-items:baseline; }
.st { font-weight:800; font-size:10.5px; letter-spacing:.07em; white-space:nowrap; }
.sess.working      { border-left-color:var(--green); }
.sess.limit        { border-left-color:var(--yellow); }
.sess.needs_input,
.sess.blocked      { border-left-color:var(--accent); }
.sess.waiting      { border-left-color:var(--accent-2); }
.sess.ended        { border-left-color:var(--border-2); opacity:.55; }
.st.working  { color:var(--green); }
.st.working .g { animation:blink 1.2s steps(1) infinite; }
.st.needs_input { color:var(--accent); }
.st.limit    { color:var(--yellow); }
.st.blocked  { color:var(--yellow); }
.st.waiting  { color:var(--accent-2); }
.st.ended    { color:var(--muted-2); }
.acct { color:var(--cyan); font-size:11px; }
.meta { color:var(--muted-2); font-size:11px; }
.subdir { color:var(--yellow); font-size:11px; }
.topic { color:var(--fg); margin-top:4px; font-size:11.5px;
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.said { color:var(--muted); margin-top:3px; font-size:11.5px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.said::before { content:"⏎ "; color:var(--muted-2); }
.you { color:var(--cyan); margin-top:3px; font-size:11.5px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.you::before { content:"→ "; color:var(--muted-2); }
.subag { color:var(--green); font-size:11px; }
.wsaid { color:var(--muted); margin-top:3px; font-size:11.5px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.wsaid::before { content:"⚙ "; color:var(--green); }
.pending { color:var(--yellow); font-size:11px; margin-top:3px; }
.hand { color:var(--green); font-size:11px; margin-top:3px; }
.none { color:var(--muted-2); font-size:12px; padding:2px 6px 6px; }

/* ---- footer ---- */
.other { margin-top:20px; color:var(--muted); font-size:12px; }
.other h3 { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); margin-bottom:6px; }
.controls { display:flex; gap:18px; margin:18px 0 6px; color:var(--muted); font-size:12px; flex-wrap:wrap; }
.controls label { cursor:pointer; user-select:none; }
.controls input { accent-color:var(--accent); margin-right:5px; vertical-align:-1px; }
</style>
</head>
<body>
<header><div class="wrap nav">
  <div class="brand"><span class="prompt" id="brandUser">fleet</span><span class="path">:~</span><span class="prompt">$</span> <span class="cmd">./fleetboard --watch</span><span class="cursor"></span></div>
  <div class="navr">
  <button id="missionBtn" onclick="openMission()">🚀 new mission</button>
  <div class="sync" id="sync"><span class="dot"></span><span id="syncText">connecting…</span></div></div>
</div></header>

<div id="drawer">
  <div class="dhead"><div><div class="t" id="dtitle"></div><div class="sub" id="dsub"></div></div>
    <button onclick="closeDrawer()">✕</button></div>
  <div id="dbody"></div>
  <div class="dfoot" id="dfoot"></div>
</div>

<nav class="side">
  <a href="/" class="active"><span class="g">⌗</span>board</a>
  <a href="/map"><span class="g">⌁</span>map</a>
  <a href="/limits"><span class="g">◔</span>limits</a>
</nav>

<div class="wrap content">
  <div class="tiles" id="tiles"></div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <label><input type="checkbox" id="showEnded"> show ended sessions</label>
    <label><input type="checkbox" id="bell"> ␇ bell when an agent needs you</label>
  </div>
  <div class="other" id="other"></div>
</div>
<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const STATUS = {
  working:     { glyph:"●", label:"WORKING" },
  needs_input: { glyph:"▲", label:"NEEDS ANSWER" },
  limit:       { glyph:"⛔", label:"LIMIT HIT" },
  blocked:     { glyph:"■", label:"BLOCKED · pending tool" },
  waiting:     { glyph:"◆", label:"YOUR TURN · idle @ prompt" },
  ended:       { glyph:"○", label:"ENDED" },
};
const AVAIL = { free:"FREE", busy:"BUSY", attention:"NEEDS YOU" };

function rel(s) {
  if (s == null) return "—";
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h" + Math.floor((s%3600)/60) + "m";
  return Math.floor(s/86400) + "d";
}

let lastAttn = null;
function maybeBell(attn) {
  if ($("bell").checked && lastAttn != null && attn > lastAttn) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "square"; o.frequency.value = 880;
      g.gain.setValueAtTime(.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + .35);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + .36);
    } catch (e) {}
  }
  lastAttn = attn;
}

const REG = {};
function render(st) {
  const now = st.generated_at;
  $("brandUser").textContent = `${st.user || "you"}@fleet`;
  for (const w of st.worktrees)
    for (const s of w.sessions)
      REG[`${w.name}|${s.sid}`] = { s, procs: w.live_procs, wt: w.name };
  const c = st.counts;
  const attn = c.needs_input + c.blocked + c.waiting + (c.limit || 0);
  maybeBell(attn);
  document.title = attn > 0 ? `(${attn}!) fleetboard` : "fleetboard";

  const freeNames = st.free_worktrees || [];
  $("tiles").innerHTML = `
    <div class="tile ok"><div class="k">● working</div><div class="v">${c.working}</div><div class="sub">agents mid-turn</div></div>
    <div class="tile ${attn ? "attn" : ""}"><div class="k">▲ need you</div><div class="v">${attn}</div>
      <div class="sub">${c.needs_input} question · ${c.limit || 0} ⛔ limit · ${c.blocked} blocked · ${c.waiting} idle</div></div>
    <div class="tile free"><div class="k">◇ free worktrees</div><div class="v">${freeNames.length}</div>
      <div class="sub" title="${esc(freeNames.join(", "))}">${esc(freeNames.join(", ") || "none — everything busy")}</div></div>
    <div class="tile"><div class="k">⌁ live agents</div><div class="v">${st.worktrees.reduce((n,w)=>n+w.live_procs.length,0) + st.other_procs.length}</div>
      <div class="sub">claude processes on ${esc(st.hostname)}</div></div>`;

  $("grid").innerHTML = st.worktrees.map(w => {
    const g = w.git || {};
    const sync = (g.ahead != null) ? `<span class="sync-count">↑${g.ahead} ↓${g.behind}</span>` : "";
    const dirty = g.dirty ? `<span class="delta">Δ${g.dirty} uncommitted</span>` : "";
    const commit = g.commit ? `<span class="hash">${esc(g.commit.hash)}</span> · ${rel(Math.max(0, Math.floor(now - g.commit.ts)))} ago · ${esc(g.commit.subject)}` : "no commits";
    const showEnded = $("showEnded").checked;
    const sess = w.sessions.filter(s => showEnded || s.status !== "ended");
    const rows = sess.map(s => {
      const stt = { ...STATUS[s.status] };
      if (s.status === "limit" && s.limit)
        stt.label = `LIMIT HIT · ${s.limit.worst || "usage"}${s.limit.resets_in ? " · resets in " + rel(s.limit.resets_in) : ""}`;
      const pend = (s.status !== "working" && s.pending_tools.length)
        ? `<div class="pending">⧗ waiting on: ${esc(s.pending_tools.join(", "))}</div>` : "";
      return `<div class="sess ${s.status}">
        <div class="row1">
          <span class="st ${s.status}"><span class="g">${stt.glyph}</span> ${stt.label}</span>
          <span class="acct">[${esc(s.account)}]</span>
          <span class="meta">${esc(s.model || "?")}</span>
          <span class="meta">${rel(s.age_s)} ago</span>
          ${s.subdir ? `<span class="subdir">./${esc(s.subdir)}</span>` : ""}
          ${s.branch && s.branch !== g.branch ? `<span class="meta"> ${esc(s.branch)}</span>` : ""}
          ${s.subagents_active ? `<span class="subag">⚙ subagents running</span>`
            : s.pending_workflows ? `<span class="subag">⚙ awaiting ${s.pending_workflows} workflow${s.pending_workflows > 1 ? "s" : ""}</span>` : ""}
          <span style="margin-left:auto;display:flex;gap:6px">
            ${s.status === "limit" && s.limit && s.limit.group === "session" && s.limit.resets_at
              ? `<button class="abtn resume" data-key="${esc(w.name)}|${esc(s.sid)}" data-until="${s.limit.resets_at}">▶ resume</button>` : ""}
            <button class="abtn" onclick="openChat('${esc(w.name)}|${esc(s.sid)}')">✉ chat</button>
          </span>
        </div>
        ${s.topic ? `<div class="topic">${esc(s.topic)}</div>` : ""}
        ${s.last_user && s.last_user !== s.topic ? `<div class="you">${esc(s.last_user)}</div>` : ""}
        ${s.last_assistant ? `<div class="said">${esc(s.last_assistant)}</div>` : ""}
        ${s.subagent_said ? `<div class="wsaid" title="latest subagent report">${esc(s.subagent_said)}</div>` : ""}
        ${s.handed_to ? `<div class="hand">↳ work continued by [${esc(s.handed_to)}] — this terminal can be closed</div>` : ""}
        ${pend}
      </div>`;
    }).join("");
    return `<div class="card ${w.availability === "attention" ? "attention" : ""}">
      <div class="card-head">
        <span class="badge ${w.availability}">${AVAIL[w.availability]}</span>
        <span class="name">${esc(w.name)}</span>
        <span class="procs">${w.live_procs.length
          ? w.live_procs.map(p => `<button class="pidbtn" onclick="focusPid(${p.pid})" title="jump to this terminal">⌖ ${p.pid}${p.tty ? ` <span class="tt">${esc(p.tty)}</span>` : ""}${p.host ? ` ${esc(p.host)}` : ""}</button>`).join("")
          : `<span class="noproc">no live proc</span>`}</span>
      </div>
      <div class="gitline"><span class="branch">${esc(g.branch || "?")}</span>${dirty}${sync}</div>
      <div class="commit" title="${esc(g.commit ? g.commit.subject : "")}">${commit}</div>
      <div class="sessions">${rows || `<div class="none">${w.sessions.length ? w.sessions.length + " ended session(s) hidden" : "no recent sessions"}</div>`}</div>
    </div>`;
  }).join("");

  $("other").innerHTML = st.other_procs.length
    ? `<h3>other live agents (outside watched worktrees)</h3>` +
      st.other_procs.map(p => `<div>⌁ <button class="pidbtn" onclick="focusPid(${p.pid})">⌖ ${p.pid}${p.tty ? ` <span class="tt">${esc(p.tty)}</span>` : ""}${p.host ? ` ${esc(p.host)}` : ""}</button> ${p.cpu.toFixed(1)}% cpu · up ${esc(p.etime)} · ${esc(p.cwd || "?")}</div>`).join("")
    : "";
}

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 6000);
}
async function focusPid(pid) {
  toast(`⌖ locating pid ${pid}…`);
  try {
    const r = await fetch(`/api/focus?pid=${pid}`);
    const res = await r.json();
    toast((res.ok ? "" : "✗ ") + res.message);
  } catch (e) { toast("✗ focus request failed"); }
}

let lastState = null;
async function tick() {
  try {
    const r = await fetch("/api/state");
    lastState = await r.json();
    render(lastState);
    $("sync").classList.remove("err");
    $("syncText").textContent = "sync " + new Date().toLocaleTimeString();
  } catch (e) {
    $("sync").classList.add("err");
    $("syncText").textContent = "reconnecting…";
  }
}
$("showEnded").addEventListener("change", () => { localStorage.fbEnded = $("showEnded").checked ? "1" : ""; lastState && render(lastState); });
$("bell").addEventListener("change", () => { localStorage.fbBell = $("bell").checked ? "1" : ""; });
$("showEnded").checked = localStorage.fbEnded === "1";
$("bell").checked = localStorage.fbBell === "1";
// ---- drawer: chat with an agent / launch a mission -------------------------
let chatCtx = null, chatTimer = null;
function closeDrawer() {
  $("drawer").classList.remove("open");
  chatCtx = null;
  clearTimeout(chatTimer);
}
function reachableProcs(procs) { return procs.filter(p => p.reachable); }

function openChat(key) {
  const r = REG[key];
  if (!r) return;
  chatCtx = { key, account: r.s.account, sid: r.s.sid };
  $("dtitle").textContent = `${r.wt} · [${r.s.account}]`;
  $("dsub").textContent = r.s.topic || r.s.sid;
  const procs = reachableProcs(r.procs);
  $("dfoot").innerHTML = procs.length ? `
    ${r.procs.length > 1 ? `<select id="chatTarget">${r.procs.map(p =>
      `<option value="${p.pid}" ${p.reachable ? "" : "disabled"}>⌖ ${p.pid} · ${esc(p.tty || "?")} · ${esc(p.host || "?")}${p.reachable ? "" : " (unreachable)"}</option>`).join("")}</select>` : ""}
    <div class="row">
      <textarea id="chatText" placeholder="type an instruction for this agent…"></textarea>
      <button class="send" onclick="sendChat()">send</button>
    </div>
    <div class="dnote">typed straight into the agent's terminal (${esc(procs[0].tty || "tmux")} · ${esc(procs[0].host || "tmux")})</div>`
    : `<div class="dnote"><b>read-only</b> — no scriptable live process for this worktree
       (Cursor/VS Code terminals can't be typed into; ended sessions have no terminal)</div>`;
  if (procs.length === 1) window._chatPid = procs[0].pid;
  $("dbody").innerHTML = `<div class="dnote">loading transcript…</div>`;
  $("drawer").classList.add("open");
  loadChatMsgs();
}
async function loadChatMsgs() {
  if (!chatCtx) return;
  try {
    const r = await fetch(`/api/chat?account=${encodeURIComponent(chatCtx.account)}&sid=${chatCtx.sid}`);
    const d = await r.json();
    if (d.ok) {
      $("dbody").innerHTML = d.messages.map(m =>
        `<div class="msg ${m.role === "you" ? "you" : "agent"}">${esc(m.text)}</div>`).join("")
        || `<div class="dnote">no conversation yet</div>`;
      $("dbody").scrollTop = $("dbody").scrollHeight;
    } else $("dbody").innerHTML = `<div class="dnote">✗ ${esc(d.error)}</div>`;
  } catch (e) {}
  chatTimer = setTimeout(loadChatMsgs, 5000);
}
async function sendToPid(pid, text) {
  const r = await fetch("/api/send", { method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pid, text }) });
  return r.json();
}
async function sendChat() {
  const text = $("chatText").value.trim();
  if (!text || !chatCtx) return;
  const sel = $("chatTarget");
  const pid = sel ? parseInt(sel.value) : window._chatPid;
  if (!pid) { toast("✗ no reachable process"); return; }
  $("chatText").value = "";
  $("dbody").insertAdjacentHTML("beforeend", `<div class="msg you">${esc(text)}</div>`);
  $("dbody").scrollTop = $("dbody").scrollHeight;
  const res = await sendToPid(pid, text);
  toast((res.ok ? "✓ " : "✗ ") + res.message);
}

// ---- resume: arm the button when a session limit has reset -----------------
document.addEventListener("click", async (ev) => {
  const b = ev.target.closest ? ev.target.closest(".resume") : null;
  if (!b || b.disabled) return;
  const r = REG[b.dataset.key];
  const procs = r ? reachableProcs(r.procs) : [];
  if (!procs.length) { toast("✗ no scriptable terminal for this worktree"); return; }
  toast("▶ sending continue…");
  const res = await sendToPid(procs[0].pid, "continue");
  toast((res.ok ? "✓ resumed — " : "✗ ") + res.message);
});
setInterval(() => {
  const now = Date.now() / 1000;
  document.querySelectorAll(".resume").forEach(b => {
    const left = parseFloat(b.dataset.until) - now;
    if (left <= 0) { b.disabled = false; b.classList.add("armed"); b.textContent = "▶ resume now"; }
    else { b.disabled = true; b.classList.remove("armed"); b.textContent = "▶ resume in " + rel(left); }
  });
}, 1000);

// ---- mission composer ------------------------------------------------------
let LIMITS = null;
function acctLabel(dir) {
  const base = (dir || "").split("/").pop();
  return base === ".claude" ? "main" : base.replace(/^\.claude-?/, "");
}
function openMission() {
  chatCtx = null; clearTimeout(chatTimer);
  $("dtitle").textContent = "🚀 new mission";
  $("dsub").textContent = "dispatch a tmux-hosted agent into the fleet";
  const frees = lastState ? lastState.free_worktrees : [];
  const all = lastState ? lastState.worktrees.map(w => w.name) : [];
  const accts = LIMITS && LIMITS.accounts ? LIMITS.accounts.filter(a => a.ok) : [];
  $("dbody").innerHTML = `<div class="dnote">describe the feature or task. worktree &
    account default to the best free/most-headroom picks; the router option asks a
    one-shot claude (haiku) to choose and to write the kickoff brief.</div>`;
  $("dfoot").innerHTML = `
    <textarea id="mText" style="min-height:90px" placeholder="what should be built?"></textarea>
    <div class="row">
      <select id="mWt"><option value="">worktree: auto (${esc(frees[0] || "none free")})</option>
        ${all.map(n => `<option value="${esc(n)}">${esc(n)}${frees.includes(n) ? " · free" : ""}</option>`).join("")}</select>
      <select id="mAcct"><option value="">account: auto</option>
        ${accts.map(a => `<option value="${esc(acctLabel(a.config_dir))}">${esc(acctLabel(a.config_dir))} · ${Math.round(a.headroom_percent ?? 0)}% left</option>`).join("")}</select>
    </div>
    <div class="row"><label class="dnote" style="cursor:pointer">
      <input type="checkbox" id="mRouter" checked> route &amp; brief with claude (haiku, one call)</label>
      <button class="send" style="margin-left:auto" onclick="launchMission()">launch</button></div>`;
  $("drawer").classList.add("open");
}
async function launchMission() {
  const mission = $("mText").value.trim();
  if (!mission) { toast("✗ empty mission"); return; }
  $("dbody").innerHTML = `<div class="dnote">dispatching… (router adds ~15s)</div>`;
  try {
    const r = await fetch("/api/dispatch", { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mission, worktree: $("mWt").value, account: $("mAcct").value,
                             router: $("mRouter").checked }) });
    const d = await r.json();
    $("dbody").innerHTML = d.ok
      ? `<div class="dresult">✓ ${esc(d.message)}<br><br>kickoff brief:<br>${esc(d.kickoff)}<br><br>
         attach anytime: <code>${esc(d.attach)}</code><br>
         the agent appears on the board once its transcript starts (~30s).</div>`
      : `<div class="dresult">✗ ${esc(d.message)}</div>`;
    toast((d.ok ? "✓ " : "✗ ") + d.message);
  } catch (e) { toast("✗ dispatch failed"); }
}

// prime the server's cclimits cache so exhausted accounts surface as ⛔ LIMIT
function primeLimits() {
  fetch("/api/limits").then(r => r.json()).then(d => { LIMITS = d; tick(); }).catch(() => {});
}
tick();
primeLimits();
setInterval(tick, 5000);
setInterval(primeLimits, 300000);
</script>
