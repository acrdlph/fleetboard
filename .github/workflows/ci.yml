name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# a newer push to the same ref cancels an in-flight run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # git is preinstalled; tmux lets the actuation integration tests run for
      # real instead of self-skipping. No pip install — the project is stdlib-only.
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Byte-compile
        run: python -m py_compile fleetboard.py

      - name: Run tests
        run: python -m unittest discover -s tests -v
