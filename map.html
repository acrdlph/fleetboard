<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fleetboard — map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23d97757%22 font-family=%22monospace%22>⌁</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0d0d0d; --bg-2:#111111; --surface:#161616; --surface-2:#1c1c1c;
  --border:#2a2a2a; --border-2:#3a3a3a;
  --fg:#e8e6e3; --muted:#8a8784; --muted-2:#6a6764;
  --accent:#d97757; --accent-2:#e8a87c; --green:#87b386; --cyan:#7fb3c8; --yellow:#d4b06a;
  --accent-glow:rgba(217,119,87,.25);
  --mono:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
* { box-sizing:border-box; margin:0; padding:0; }
html { background:var(--bg); }
body {
  font-family:var(--mono); font-size:13.5px; color:var(--fg);
  background:
    radial-gradient(1100px 480px at 80% -10%, rgba(217,119,87,.05), transparent 60%),
    var(--bg);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.wrap { max-width:1500px; margin-inline:auto; padding-inline:22px; }
header {
  position:sticky; top:0; z-index:10;
  background:color-mix(in oklab, var(--bg) 86%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
}
.nav { display:flex; align-items:center; justify-content:space-between; height:52px; gap:16px; }
.brand { font-weight:700; white-space:nowrap; }
.brand .prompt { color:var(--accent); }
.brand .path { color:var(--cyan); }
.nav a { color:var(--muted); text-decoration:none; padding:6px 11px; border-radius:6px;
  transition:color .2s var(--ease), background .2s var(--ease); font-size:13px; }
.nav a::before { content:"~/"; color:var(--muted-2); }
.nav a:hover { color:var(--fg); background:var(--surface); }
.nav .right { display:flex; align-items:center; gap:8px; }
.sync { color:var(--muted); font-size:12px; white-space:nowrap; display:flex; align-items:center; gap:8px; }
.sync .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
.sync.err .dot { background:var(--accent); }

.side { position:fixed; left:0; top:52px; bottom:0; width:118px; z-index:9;
  padding:16px 10px; display:flex; flex-direction:column; gap:5px;
  border-right:1px solid var(--border); background:var(--bg-2); }
.side a { color:var(--muted); text-decoration:none; font-size:12.5px; font-weight:600;
  padding:8px 12px; border-radius:7px; display:flex; gap:9px; align-items:baseline;
  transition:color .2s var(--ease), background .2s var(--ease); }
.side a::before { content:none; }
.side a .g { color:var(--muted-2); }
.side a:hover { color:var(--fg); background:var(--surface); }
.side a.active { color:var(--fg); background:var(--surface); box-shadow:inset 2px 0 0 var(--accent); }
.side a.active .g { color:var(--accent); }
.content { margin-left:118px; }
@media (max-width:860px) {
  .side { position:static; width:auto; flex-direction:row; border-right:none;
    border-bottom:1px solid var(--border); padding:8px 22px; }
  .content { margin-left:0; }
}

.bar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin:16px 0 4px; }
.chip { font-size:11px; font-weight:800; letter-spacing:.07em; border:1px solid; border-radius:6px;
  padding:4px 10px; background:var(--bg-2); }
.chip.w { color:var(--green); border-color:var(--green); }
.chip.n { color:var(--accent); border-color:var(--accent); }
.chip.t { color:var(--accent-2); border-color:var(--accent-2); }
.chip.f { color:var(--cyan); border-color:var(--cyan); }
.chip.l { color:var(--yellow); border-color:var(--yellow); }
.hint { color:var(--muted-2); font-size:11.5px; margin-left:auto; }

#viz { margin:6px 0 40px; }
svg { display:block; }
svg text { font-family:var(--mono); }
.hit { cursor:pointer; }
g.branchg { opacity:.92; transition:opacity .15s; }
g.branchg:hover { opacity:1; }
g.branchg:hover .bline { stroke-opacity:1; }

#tip {
  position:fixed; z-index:50; display:none; max-width:460px; pointer-events:none;
  background:var(--surface-2); border:1px solid var(--border-2); border-radius:9px;
  padding:10px 13px; font-size:12px; line-height:1.5; color:var(--fg);
  box-shadow:0 12px 34px rgba(0,0,0,.55);
}
#tip .hd { font-weight:800; font-size:13px; }
#tip .br { color:var(--cyan); }
#tip .mut { color:var(--muted); }
#tip .dim { color:var(--muted-2); }
#tip .st { font-weight:800; letter-spacing:.06em; font-size:11px; }
#tip .mut, #tip .dim { font-family:"Inter", ui-sans-serif, system-ui, sans-serif; }
#toast {
  position:fixed; right:18px; bottom:18px; z-index:60; max-width:440px;
  background:var(--surface-2); border:1px solid var(--accent); border-radius:9px;
  padding:10px 14px; font-size:12.5px; color:var(--fg); display:none;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
</style>
</head>
<body>
<header><div class="wrap nav">
  <div class="brand"><span class="prompt" id="brandUser">fleet</span><span class="path">:~</span><span class="prompt">$</span> ./fleetboard --map</div>
  <div class="right">
    <div class="sync" id="sync"><span class="dot"></span><span id="syncText">connecting…</span></div></div>
</div></header>

<nav class="side">
  <a href="/"><span class="g">⌗</span>board</a>
  <a href="/map" class="active"><span class="g">⌁</span>map</a>
  <a href="/limits"><span class="g">◔</span>limits</a>
</nav>

<div class="wrap content">
  <div class="bar">
    <span class="chip w">● WORKING</span>
    <span class="chip n">▲ NEEDS YOU</span>
    <span class="chip t">◆ YOUR TURN</span>
    <span class="chip l">⛔ LIMIT</span>
    <span class="chip f">◇ FREE</span>
    <span class="hint">time runs log-scaled into “now” → · ⌖ click a node to jump to its terminal</span>
  </div>
  <div id="viz"></div>
</div>
<div id="tip"></div>
<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const C = { green:"#87b386", accent:"#d97757", accent2:"#e8a87c", cyan:"#7fb3c8",
            yellow:"#d4b06a", fg:"#e8e6e3", muted:"#8a8784", muted2:"#6a6764",
            border:"#2a2a2a", bg:"#0d0d0d" };
const STATUS = {
  needs: { color:C.accent,  glyph:"▲", word:"NEEDS YOU" },
  limit: { color:C.yellow,  glyph:"⛔", word:"LIMIT" },
  turn:  { color:C.accent2, glyph:"◆", word:"YOUR TURN" },
  work:  { color:C.green,   glyph:"●", word:"WORKING" },
  free:  { color:C.cyan,    glyph:"◇", word:"FREE" },
};

function rel(s) {
  s = Math.max(0, Math.round(s));
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h";
  if (s < 14*86400) return Math.floor(s/86400) + "d" + Math.floor(s%86400/3600) + "h";
  return Math.floor(s/86400) + "d";
}

function statusOf(wt) {
  if (!wt) return { key:"free", ...STATUS.free };
  // a handed-off limit session no longer speaks for the worktree, and an
  // actively working session outranks a parked co-session
  const st = wt.sessions.filter(s => !(s.status === "limit" && s.handed_to)).map(s => s.status);
  if (st.includes("needs_input") || st.includes("blocked")) return { key:"needs", ...STATUS.needs };
  if (st.includes("limit")) return { key:"limit", ...STATUS.limit };
  if (st.includes("working") || wt.availability === "busy") return { key:"work", ...STATUS.work };
  if (st.includes("waiting")) return { key:"turn", ...STATUS.turn };
  return { key:"free", ...STATUS.free };
}

let state = null, topo = null, byName = {}, lookup = {};

// ---- layout ---------------------------------------------------------------
const PAD_L = 30, PAD_R = 40, LANE_H = 64, TOP_PAD = 56, AXIS_H = 30;

function render() {
  if (!topo) return;
  const W = Math.max(900, $("viz").clientWidth);
  const now = topo.generated_at;
  byName = {}; lookup = {};
  if (state) for (const w of state.worktrees) byName[w.name] = w;

  // global log time scale, right edge = now
  let tmin = now - 6*3600;
  for (const g of topo.groups) {
    for (const b of g.branches) tmin = Math.min(tmin, b.fork_ts);
    for (const t of g.trunk_commits) tmin = Math.min(tmin, t);
  }
  const S = 900, span = now - tmin, denom = Math.log1p(span / S);
  const innerW = W - PAD_L - PAD_R;
  const x = (t) => PAD_L + innerW * (1 - Math.log1p(Math.max(0, now - t) / S) / denom);

  // age gridline ticks, thinned right-to-left
  const AGES = [[0,"now"],[3600,"1h"],[3*3600,"3h"],[6*3600,"6h"],[12*3600,"12h"],
    [86400,"1d"],[2*86400,"2d"],[4*86400,"4d"],[7*86400,"1w"],[14*86400,"2w"],
    [30*86400,"1mo"],[61*86400,"2mo"],[91*86400,"3mo"],[183*86400,"6mo"],[365*86400,"1y"]];
  const ticks = []; let lastX = Infinity;
  for (const [age, label] of AGES) {
    if (age > span) break;
    const tx = x(now - age);
    if (lastX - tx < 54 && age !== 0) continue;
    ticks.push([tx, label]); lastX = tx;
  }

  // vertical layout per group
  let y = 8; const parts = []; const groupsG = [];
  for (const g of topo.groups) {
    const branches = g.branches.filter(b => b.ahead > 0).sort((a,b) => a.fork_ts - b.fork_ts);
    const riders   = g.branches.filter(b => b.ahead === 0).sort((a,b) => a.tip_ts - b.tip_ts);
    const trunkY = y + TOP_PAD + branches.length * LANE_H + 26;
    // x-aware label stagger: each rider takes the first row with >=180px clearance
    const rowsX = [];
    const riderPlace = riders.map(b => {
      const rx = x(b.tip_ts);
      let row = rowsX.findIndex(lx => rx - lx >= 180);
      if (row === -1) row = rowsX.length;
      rowsX[row] = rx;
      return row;
    });
    const gh = TOP_PAD + branches.length * LANE_H + 26 + (riders.length ? 30 + rowsX.length * 32 + 16 : 40);
    groupsG.push({ g, branches, riders, riderPlace, top:y, trunkY, h:gh });
    y += gh;
  }
  const H = y + AXIS_H;

  for (const [tx, label] of ticks) {
    parts.push(`<line x1="${tx}" y1="4" x2="${tx}" y2="${H-AXIS_H+6}" stroke="rgba(232,230,227,.05)" stroke-width="1"/>`);
    parts.push(`<text x="${tx}" y="${H-9}" fill="${C.muted2}" font-size="10.5" text-anchor="middle">${label}</text>`);
  }

  for (const G of groupsG) {
    const { g, branches, riders, top, trunkY } = G;
    const trunkX0 = Math.min(x(tmin), ...g.branches.map(b => x(b.fork_ts))) - 14;
    const trunkX1 = W - PAD_R;
    const nBr = g.branches.length;
    parts.push(`<text x="${PAD_L}" y="${top+22}" fill="${C.fg}" font-size="14" font-weight="800">${esc(g.repo)}</text>`);
    parts.push(`<text x="${PAD_L + 12 + g.repo.length*9.2}" y="${top+22}" fill="${C.muted2}" font-size="11.5">${nBr} worktree${nBr===1?"":"s"} on one trunk</text>`);

    // trunk
    parts.push(`<line x1="${trunkX0}" y1="${trunkY}" x2="${trunkX1}" y2="${trunkY}" stroke="${C.muted}" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>`);
    for (const t of g.trunk_commits) {
      const cx = x(t);
      if (cx > trunkX0 + 6) parts.push(`<circle cx="${cx}" cy="${trunkY}" r="2" fill="${C.muted2}"/>`);
    }
    const mtX = x(g.trunk_ts);
    parts.push(`<circle cx="${mtX}" cy="${trunkY}" r="4" fill="${C.fg}" stroke="${C.bg}" stroke-width="1.5"/>`);
    parts.push(`<text x="${trunkX1}" y="${trunkY-11}" fill="${C.cyan}" font-size="11.5" font-weight="700" text-anchor="end">${esc(g.base)}</text>`);

    // branch lanes (earliest fork = top lane)
    branches.forEach((b, i) => {
      const key = `b:${esc(b.worktree)}`; lookup[key] = b;
      const st = statusOf(byName[b.worktree]);
      const ly = top + TOP_PAD + i * LANE_H;
      const fx = x(b.fork_ts), txp = Math.max(x(b.tip_ts), fx + 2);
      const e = Math.max(6, Math.min(44, txp - fx));
      const mid = (trunkY + ly) / 2;
      let d = `M ${fx} ${trunkY} C ${fx} ${mid}, ${fx} ${ly}, ${Math.min(fx+e, txp)} ${ly}`;
      if (txp > fx + e) d += ` L ${txp} ${ly}`;
      let inner = `<path class="bline" d="${d}" fill="none" stroke="${st.color}" stroke-width="2" stroke-opacity=".55" stroke-linecap="round"/>`;
      inner += `<circle cx="${fx}" cy="${trunkY}" r="3" fill="${C.bg}" stroke="${st.color}" stroke-width="1.5"/>`;
      for (const t of b.commits) {
        const cx = x(t);
        if (cx > fx + e + 3 && cx < txp - 8) inner += `<circle cx="${cx}" cy="${ly}" r="2" fill="${st.color}" opacity=".75"/>`;
      }
      if (st.key === "work")
        inner += `<circle cx="${txp}" cy="${ly}" r="7" fill="none" stroke="${st.color}" stroke-width="1.5">
          <animate attributeName="r" values="7;15" dur="1.7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".7;0" dur="1.7s" repeatCount="indefinite"/></circle>`;
      inner += `<circle cx="${txp}" cy="${ly}" r="6.5" fill="${C.bg}" stroke="${st.color}" stroke-width="2.5"/>`;
      inner += `<circle cx="${txp}" cy="${ly}" r="2.6" fill="${st.color}"/>`;
      const left = txp > W - 340;
      const lx = left ? txp - 14 : txp + 14, anchor = left ? "end" : "start";
      inner += `<text x="${lx}" y="${ly-26}" text-anchor="${anchor}" font-size="12.5" font-weight="800" fill="${C.fg}">${esc(b.worktree)}  <tspan fill="${st.color}" font-size="10">${st.glyph} ${st.word}</tspan></text>`;
      inner += `<text x="${lx}" y="${ly-12}" text-anchor="${anchor}" font-size="11" fill="${C.cyan}"> ${esc(b.branch)}</text>`;
      const stats = `+${b.ahead}${b.behind ? ` ↓${b.behind}` : ""}${b.dirty ? ` Δ${b.dirty}` : ""} · ${rel(now-b.tip_ts)} ago`;
      inner += `<text x="${lx}" y="${ly+18}" text-anchor="${anchor}" font-size="10.5" fill="${C.muted}">${esc(stats)}</text>`;
      inner += `<rect x="${Math.min(fx,txp)-10}" y="${ly-34}" width="${Math.abs(txp-fx)+220}" height="60" fill="transparent"/>`;
      parts.push(`<g class="branchg hit" data-key="${key}">${inner}</g>`);
    });

    // riders: worktrees sitting directly on the trunk
    riders.forEach((b, i) => {
      const key = `b:${esc(b.worktree)}`; lookup[key] = b;
      const st = statusOf(byName[b.worktree]);
      const rx = x(b.tip_ts);
      const row = G.riderPlace[i];
      const lyy = trunkY + 28 + row * 32;
      let inner = `<line x1="${rx}" y1="${trunkY+6}" x2="${rx}" y2="${lyy-6}" stroke="${C.border}" stroke-width="1"/>`;
      if (st.key === "work")
        inner += `<circle cx="${rx}" cy="${trunkY}" r="6" fill="none" stroke="${st.color}" stroke-width="1.5">
          <animate attributeName="r" values="6;13" dur="1.7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".7;0" dur="1.7s" repeatCount="indefinite"/></circle>`;
      inner += `<circle cx="${rx}" cy="${trunkY}" r="5.5" fill="${C.bg}" stroke="${st.color}" stroke-width="2.5"/>`;
      inner += `<circle cx="${rx}" cy="${trunkY}" r="2.2" fill="${st.color}"/>`;
      const left = rx > W - 300;
      const lx = left ? rx - 10 : rx + 10, anchor = left ? "end" : "start";
      const info = `on trunk${b.behind ? ` · ↓${b.behind} behind tip` : " · at tip"}${b.dirty ? ` · Δ${b.dirty}` : ""}`;
      inner += `<text x="${lx}" y="${lyy}" text-anchor="${anchor}" font-size="11.5" font-weight="800" fill="${C.fg}">${esc(b.worktree)} <tspan fill="${st.color}" font-size="9.5">${st.glyph} ${st.word}</tspan></text>`;
      inner += `<text x="${lx}" y="${lyy+13}" text-anchor="${anchor}" font-size="10" fill="${C.muted}">${esc(info)}</text>`;
      parts.push(`<g class="branchg hit" data-key="${key}">${inner}</g>`);
    });
  }

  $("viz").innerHTML = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${parts.join("")}</svg>`;
}

// ---- tooltip & focus ------------------------------------------------------
function tipHTML(b) {
  const wt = byName[b.worktree], st = statusOf(wt);
  const now = topo.generated_at;
  let h = `<div class="hd">${esc(b.worktree)} <span class="br"> ${esc(b.branch)}</span></div>`;
  h += `<div class="st" style="color:${st.color}">${st.glyph} ${st.word}</div>`;
  h += `<div class="mut">${esc(b.hash)} ${esc(b.subject)} <span class="dim">· ${rel(now-b.tip_ts)} ago</span></div>`;
  h += `<div class="mut">+${b.ahead} ahead · ↓${b.behind} behind ${esc("origin/main")} · Δ${b.dirty} uncommitted</div>`;
  h += `<div class="dim">forked ${rel(now-b.fork_ts)} ago</div>`;
  if (wt) {
    for (const s of wt.sessions.slice(0, 3))
      h += `<div class="dim">· ${esc(s.status)} [${esc(s.account)}]${s.handed_to ? ` ↳ continued by [${esc(s.handed_to)}]` : ""} ${esc(s.model||"")} ${rel(s.age_s)} ago</div>`;
    for (const p of wt.live_procs)
      h += `<div class="mut">⌖ ${p.pid}${p.tty ? " · " + esc(p.tty) : ""}${p.host ? " · " + esc(p.host) : ""} <span class="dim">— click to focus</span></div>`;
  }
  return h;
}

document.addEventListener("mousemove", (ev) => {
  const g = ev.target.closest ? ev.target.closest(".hit") : null;
  const tip = $("tip");
  if (g && lookup[g.dataset.key] && topo) {
    tip.innerHTML = tipHTML(lookup[g.dataset.key]);
    tip.style.display = "block";
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    tip.style.left = Math.min(ev.clientX + 16, window.innerWidth - tw - 12) + "px";
    tip.style.top  = Math.min(ev.clientY + 16, window.innerHeight - th - 12) + "px";
  } else tip.style.display = "none";
});

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 6000);
}
document.addEventListener("click", async (ev) => {
  const g = ev.target.closest ? ev.target.closest(".hit") : null;
  if (!g || !lookup[g.dataset.key]) return;
  const wt = byName[lookup[g.dataset.key].worktree];
  if (wt && wt.live_procs.length) {
    const pid = wt.live_procs[0].pid;
    toast(`⌖ locating pid ${pid}…`);
    try {
      const r = await fetch(`/api/focus?pid=${pid}`);
      const res = await r.json();
      toast((res.ok ? "" : "✗ ") + res.message);
    } catch (e) { toast("✗ focus request failed"); }
  } else toast(`${lookup[g.dataset.key].worktree}: no live process — free for a new agent`);
});

// ---- data loop ------------------------------------------------------------
async function loadState() {
  try {
    const r = await fetch("/api/state"); state = await r.json();
    $("brandUser").textContent = `${state.user || "you"}@fleet`;
    $("sync").classList.remove("err");
    $("syncText").textContent = "sync " + new Date().toLocaleTimeString();
  } catch (e) { $("sync").classList.add("err"); $("syncText").textContent = "reconnecting…"; }
  render();
}
async function loadTopo() {
  try { const r = await fetch("/api/topology"); topo = await r.json(); }
  catch (e) { $("sync").classList.add("err"); }
  render();
}
fetch("/api/limits").then(() => loadState()).catch(() => {});
loadTopo(); loadState();
setInterval(loadState, 10000);
setInterval(loadTopo, 30000);
window.addEventListener("resize", render);
</script>
</body>
</html>
